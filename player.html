<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0c0f">
<title>BloxyFlix Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0b0c0f;--panel:#13141a;--border:#2a2b35;
  --text:#d8d9e0;--muted:#6b6d7e;
  --red:#e8263a;--gold:#c9a84c;
  --font:'DM Sans',system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}

/* ── EMBEDDED MODE ── */
body.embedded{background:#000!important}
body.embedded .pnav{display:none!important}
body.embedded .player-info{display:none!important}
body.embedded .player-wrap{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:9999!important;background:#000!important}
body.embedded #playerContainer,body.embedded #radioContainer,body.embedded #youtubeContainer{width:100%!important;height:100%!important}
body.embedded .video-js{width:100%!important;height:100%!important;aspect-ratio:unset!important}
body.embedded .youtube-player{aspect-ratio:unset!important;height:100%!important}
body.embedded .radio-wrap{padding:0!important;height:100%!important;align-items:center!important}
body.embedded .radio-card{max-width:100%!important;width:100%!important;height:100%!important;border-radius:0!important;display:flex!important;flex-direction:column!important;justify-content:center!important}
body.embedded #youtubeFrame{width:100%!important;height:100%!important;border:none!important}

/* ── NAV ── */
.pnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:1rem;
  padding:.75rem 1rem;
  background:rgba(11,12,15,.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.pnav-back{
  display:flex;align-items:center;gap:.5rem;
  background:none;border:none;color:var(--muted);
  font-size:.88rem;font-weight:500;cursor:pointer;
  padding:.4rem .6rem;border-radius:8px;transition:color .2s;
}
.pnav-back:hover{color:var(--text);}
.pnav-back svg{fill:currentColor;flex-shrink:0;}
.pnav-logo{font-family:'DM Sans',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:-0.5px;color:#fff;}
.pnav-logo span{color:var(--red);}
.pnav-title{font-size:.85rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── VIDEO PLAYER ── */
.player-wrap{width:100%;background:#000;position:relative;}
.player-wrap video{width:100%;display:block;}
.vjs-big-play-button{border-color:var(--red)!important;}
.vjs-big-play-button .vjs-icon-placeholder:before{color:var(--red)!important;}
.video-js{width:100%!important;height:auto!important;aspect-ratio:16/9;}

/* YouTube overlay inside Video.js */
#yt-live-overlay{position:absolute;inset:0;z-index:5;}
#yt-live-overlay iframe{width:100%;height:100%;border:none;}

/* Radio */
.radio-wrap{padding:2rem 1rem;display:flex;justify-content:center;}
.radio-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:2rem;max-width:380px;width:100%;text-align:center;
}
.radio-visualizer-wrap{position:relative;width:140px;height:140px;margin:0 auto 1.5rem;}
.radio-visualizer{position:absolute;inset:0;width:100%;height:100%;opacity:.5;}
.radio-disc{
  position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  animation:spin 6s linear infinite paused;
}
.radio-disc.playing{animation-play-state:running;}
@keyframes spin{to{transform:rotate(360deg);}}
.radio-disc-inner{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),#8b0000);
  display:flex;align-items:center;justify-content:center;
}
.radio-disc-letter{color:#fff;font-weight:900;font-size:1.4rem;}
.radio-station-name{font-weight:700;font-size:1.1rem;margin-bottom:.5rem;}
.radio-live-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(232,38,58,.15);border:1px solid rgba(232,38,58,.3);
  color:var(--red);font-size:.72rem;font-weight:700;
  padding:.25rem .75rem;border-radius:20px;margin-bottom:1.25rem;
  text-transform:uppercase;letter-spacing:1px;
}
.radio-live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.radio-btn-row{display:flex;align-items:center;gap:1rem;justify-content:center;}
.radio-btn{
  width:52px;height:52px;border-radius:50%;
  background:var(--red);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 20px rgba(232,38,58,.4);
}
.radio-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(232,38,58,.55);}
.radio-btn svg{width:24px;height:24px;}
.radio-volume-wrap{flex:1;display:flex;align-items:center;gap:.6rem;color:var(--muted);}
.radio-volume{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;
}
.radio-volume::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--red);cursor:pointer;}

/* YouTube iframe container */
.youtube-player{width:100%;aspect-ratio:16/9;background:#000;}
.youtube-player iframe{width:100%;height:100%;border:none;}

/* ── INFO PANEL ── */
.player-info{padding:1rem 1rem 2rem;max-width:860px;margin:0 auto;}
.video-title{font-size:1.2rem;font-weight:700;line-height:1.4;margin-bottom:.3rem;margin-top:.75rem;}
.video-kr{font-size:.9rem;color:var(--muted);margin-bottom:.75rem;}
.video-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.video-views{font-size:.82rem;color:var(--muted);}
.rating-stars{display:flex;gap:2px;}
.star{font-size:1.1rem;color:var(--border);cursor:pointer;transition:color .15s;}
.star.active{color:var(--gold);}

/* Actions */
.actions{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;}
.action-btn{
  display:flex;align-items:center;gap:.4rem;
  padding:.55rem 1rem;
  background:var(--panel);border:1px solid var(--border);
  border-radius:25px;color:var(--text);font-size:.82rem;
  cursor:pointer;transition:all .2s;font-weight:500;
}
.action-btn:hover{background:#1e1f28;transform:translateY(-1px);}
.action-btn svg{width:18px;height:18px;fill:currentColor;}
.action-btn.primary{background:linear-gradient(135deg,var(--red),#c00);border-color:transparent;}
.action-btn.primary:hover{box-shadow:0 4px 14px rgba(232,38,58,.35);}
.action-btn.active{color:var(--red);}

/* Description */
.desc-text{font-size:.87rem;color:var(--muted);line-height:1.7;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.desc-text.expanded{display:block;}
.show-more{font-size:.82rem;color:var(--gold);cursor:pointer;margin-top:.35rem;font-weight:600;}

/* Channel row */
.channel-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.85rem 0;border-bottom:1px solid var(--border);
  border-top:1px solid var(--border);margin:.75rem 0;
}
.ch-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),#8b0000);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:.9rem;flex-shrink:0;
}
.ch-name{font-size:.9rem;font-weight:600;}
.ch-sub{font-size:.78rem;color:var(--muted);}
.subscribe-btn{
  margin-left:auto;padding:.45rem 1rem;
  background:var(--text);border:none;color:#0b0c0f;
  font-weight:700;font-size:.82rem;border-radius:20px;cursor:pointer;transition:all .2s;
}
.subscribe-btn.subscribed{background:var(--panel);color:var(--text);border:1px solid var(--border);}

/* Up Next */
.up-next-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.75rem;margin-top:1.25rem;
}
.up-next-title{font-size:.95rem;font-weight:700;}
.toggle-switch{
  width:38px;height:20px;background:var(--border);border-radius:10px;
  position:relative;cursor:pointer;transition:background .2s;
}
.toggle-switch.active{background:var(--red);}
.toggle-switch::after{
  content:'';position:absolute;top:2px;left:2px;
  width:16px;height:16px;background:#fff;border-radius:50%;
  transition:transform .2s;
}
.toggle-switch.active::after{transform:translateX(18px);}
.up-next-item{
  display:flex;gap:.75rem;margin-bottom:.75rem;
  cursor:pointer;border-radius:10px;padding:.5rem;transition:background .2s;
}
.up-next-item:hover{background:var(--panel);}
.up-next-thumb{
  width:120px;height:68px;border-radius:8px;
  background:#111;flex-shrink:0;position:relative;overflow:hidden;
}
.up-next-thumb img{width:100%;height:100%;object-fit:cover;}
.up-next-dur{
  position:absolute;bottom:3px;right:4px;
  background:rgba(0,0,0,.8);color:#fff;font-size:.65rem;
  padding:.1rem .3rem;border-radius:3px;font-family:'JetBrains Mono',monospace;
}
.up-next-info{flex:1;}
.up-next-vtitle{font-size:.85rem;font-weight:600;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.up-next-meta{font-size:.75rem;color:var(--muted);margin-top:.25rem;}

/* Comments */
.comments-section{margin-top:1.5rem;}
.comments-hdr{font-size:.95rem;font-weight:700;margin-bottom:1rem;}
.comment-input-row{display:flex;gap:.6rem;align-items:center;margin-bottom:1rem;}
.comment-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--red);color:#fff;font-weight:700;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;
}
.comment-input-row input{
  flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-size:.87rem;padding:.5rem 0;outline:none;
  font-family:var(--font);
}
.comment-input-row input::placeholder{color:var(--muted);}
.comment-input-row button{
  background:none;border:1px solid var(--border);color:var(--text);
  padding:.4rem .9rem;border-radius:20px;font-size:.8rem;cursor:pointer;
  font-weight:600;transition:all .2s;
}
.comment-input-row button:hover{background:var(--red);border-color:var(--red);}
.comment-item{display:flex;gap:.65rem;margin-bottom:1rem;}
.comment-body{}
.comment-author{font-size:.82rem;font-weight:700;margin-right:.4rem;}
.comment-time{font-size:.75rem;color:var(--muted);}
.comment-txt{font-size:.85rem;line-height:1.55;margin:.3rem 0;}
.comment-acts{display:flex;gap:.75rem;font-size:.75rem;color:var(--muted);}
.comment-acts span{cursor:pointer;transition:color .15s;}
.comment-acts span:hover{color:var(--text);}
.no-comments{text-align:center;color:var(--muted);font-size:.85rem;padding:1.5rem 0;}

/* Toast */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1e1f28;border:1px solid var(--border);color:var(--text);
  padding:.6rem 1.2rem;border-radius:25px;font-size:.85rem;
  opacity:0;transition:all .3s;pointer-events:none;z-index:9999;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Loading */
.player-loading{
  display:flex;align-items:center;justify-content:center;
  min-height:60vh;flex-direction:column;gap:1rem;color:var(--muted);
}
.player-loading-spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="pnav">
  <button class="pnav-back" onclick="goBack()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back
  </button>
  <div class="pnav-logo">BLOXY<span>FLIX</span></div>
  <div class="pnav-title" id="navTitle"></div>
</nav>

<!-- Player -->
<div class="player-wrap" id="playerWrap">
  <!-- Video.js -->
  <div id="playerContainer">
    <video id="bfplayer" class="video-js vjs-big-play-centered" playsinline></video>
  </div>
  <!-- Radio -->
  <div id="radioContainer" class="radio-wrap" style="display:none;">
    <div class="radio-card">
      <div class="radio-visualizer-wrap">
        <canvas id="radioVisualizer" class="radio-visualizer"></canvas>
        <div class="radio-disc" id="radioDisc">
          <div class="radio-disc-inner">
            <span class="radio-disc-letter" id="radioDiscLetter">R</span>
          </div>
        </div>
      </div>
      <div class="radio-station-name" id="radioStationName">Station</div>
      <div class="radio-live-badge"><span class="radio-live-dot"></span>LIVE</div>
      <div class="radio-btn-row">
        <button class="radio-btn" id="radioPlayBtn" onclick="toggleRadio()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path id="radioPlayIcon" d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="radio-volume-wrap">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" class="radio-volume" id="radioVolume" min="0" max="1" step="0.02" value="1" oninput="setRadioVolume(this.value)">
        </div>
      </div>
    </div>
  </div>
  <!-- YouTube -->
  <div id="youtubeContainer" class="youtube-player" style="display:none;">
    <iframe id="youtubeFrame" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<!-- Info -->
<div class="player-info" id="playerInfo" style="display:none;">
  <h1 class="video-title" id="pTitle"></h1>
  <p class="video-kr" id="pKr"></p>
  <div class="video-meta">
    <span class="video-views" id="pViews"></span>
    <div class="rating-stars" id="ratingStars">
      <span class="star" onclick="rateVideo(1)">★</span>
      <span class="star" onclick="rateVideo(2)">★</span>
      <span class="star" onclick="rateVideo(3)">★</span>
      <span class="star" onclick="rateVideo(4)">★</span>
      <span class="star" onclick="rateVideo(5)">★</span>
    </div>
  </div>
  <div class="actions">
    <button class="action-btn" id="likeBtn" onclick="likeVideo()">
      <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
      Like
    </button>
    <button class="action-btn" id="watchlistBtn" onclick="toggleWatchlist()">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      Watchlist
    </button>
    <button class="action-btn" onclick="shareVideo()">
      <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
      Share
    </button>
    <button class="action-btn" onclick="copyEmbedCode()">
      <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      Embed
    </button>
    <button class="action-btn primary" id="dlBtn" onclick="triggerDownload()" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Download
    </button>
  </div>
  <div class="channel-row">
    <div class="ch-avatar">BF</div>
    <div>
      <div class="ch-name">BloxyFlix Archive</div>
      <div class="ch-sub">North Korean Cinema Collection</div>
    </div>
    <button class="subscribe-btn" id="subscribeBtn" onclick="toggleSubscribe()">Subscribe</button>
  </div>
  <div id="pDesc" class="desc-text"></div>
  <div class="show-more" id="showMoreBtn" onclick="toggleDesc()">Show more</div>

  <!-- Up Next -->
  <div class="up-next-header">
    <span class="up-next-title">Up Next</span>
    <div class="toggle-switch active" id="autoplayToggle" onclick="toggleAutoplay()"></div>
  </div>
  <div id="upNextList"></div>

  <!-- Comments -->
  <div class="comments-section">
    <div class="comments-hdr"><span id="commentCount">0</span> Comments</div>
    <div class="comment-input-row">
      <div class="comment-avatar" id="commentAvatar">G</div>
      <input type="text" id="commentInput" placeholder="Add a comment..." onkeypress="if(event.key==='Enter')postComment()">
      <button onclick="postComment()">Post</button>
    </div>
    <div id="commentsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
<script>
// ── State ──
let curVid = null;
let curIdx = -1;
let slimVids = [];
let bfPlayer = null;
let radioAudio = null, radioCtx = null, radioAnalyser = null, radioAnimFrame = null, radioPlaying = false;
let autoplay = true;
let isEmbedded = false;

// ── Detect Embedded Mode ──
function detectEmbeddedMode() {
  const urlParams = new URLSearchParams(window.location.search);
  const embedParam = urlParams.get('embed');
  const isIframe = window.self !== window.top;
  isEmbedded = embedParam === '1' || embedParam === 'true' || isIframe;
  if (isEmbedded) {
    document.body.classList.add('embedded');
    document.title = curVid?.t || 'BloxyFlix Player';
  }
}

// ── Parse Video from URL Params (for embedded mode) ──
function getVideoFromURL() {
  const params = new URLSearchParams(window.location.search);
  const vidParam = params.get('vid');
  if (vidParam) {
    try {
      return JSON.parse(decodeURIComponent(vidParam));
    } catch(e) {
      // Try as base64
      try {
        return JSON.parse(atob(vidParam));
      } catch(e2) { return null; }
    }
  }
  // Support individual params
  const url = params.get('url');
  const embed = params.get('embedcode');
  
  if (embed) {
    // Raw HTML embed code passed as parameter
    return {
      u: decodeURIComponent(embed),
      t: params.get('title') || 'Embedded Video',
      tk: params.get('title') || '',
      ty: params.get('type') || 'Video',
      isEmbed: true,
      isPinned: params.get('live') === '1',
      duration: params.get('live') === '1' ? 'LIVE' : ''
    };
  }
  
  if (url) {
    const decodedUrl = decodeURIComponent(url);
    const isExternal = params.get('external') === '1' || decodedUrl.includes('koryo.tv') || decodedUrl.includes('/channel/');
    const isEmbedCode = decodedUrl.startsWith('<');
    return {
      u: decodedUrl,
      t: params.get('title') || 'Embedded Video',
      tk: params.get('title') || '',
      ty: params.get('type') || 'Video',
      isYouTube: params.get('youtube') === '1',
      isM3U8: params.get('m3u8') === '1',
      isPinned: params.get('live') === '1',
      isExternal: isExternal,
      isEmbed: isEmbedCode,
      duration: params.get('live') === '1' ? 'LIVE' : ''
    };
  }
  return null;
}

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  // Load settings
  try {
    const s = JSON.parse(localStorage.getItem('bloxyflix-settings') || '{}');
    autoplay = s.autoplay !== false;
    if (!autoplay) document.getElementById('autoplayToggle').classList.remove('active');
  } catch(e) {}

  // Detect embedded mode first
  detectEmbeddedMode();

  // Get video data - try URL params first (for embedded), then sessionStorage
  let videoLoaded = false;
  
  if (isEmbedded) {
    const vidFromURL = getVideoFromURL();
    if (vidFromURL) {
      curVid = vidFromURL;
      curIdx = -1;
      videoLoaded = true;
    }
  }
  
  if (!videoLoaded) {
    // Get video data from sessionStorage
    try {
      const raw = sessionStorage.getItem('bf-player-vid');
      const rawSlim = sessionStorage.getItem('bf-player-slim');
      if (!raw) { goBack(); return; }
      curVid = JSON.parse(raw);
      curIdx = parseInt(sessionStorage.getItem('bf-player-idx') || '0', 10);
      slimVids = rawSlim ? JSON.parse(rawSlim) : [];
      videoLoaded = true;
    } catch(e) { goBack(); return; }
  }
  
  if (!videoLoaded || !curVid) {
    showToast('No video data available');
    return;
  }

  // Init Video.js
  try {
    bfPlayer = videojs('bfplayer', {
      controls: true, autoplay: false, preload: 'auto', fluid: true, aspectRatio: '16:9',
      playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
      html5: { vhs: { overrideNative: true }, nativeVideoTracks: false, nativeAudioTracks: false }
    });
    bfPlayer.on('ended', () => { if (autoplay) playNext(); });
  } catch(e) { console.warn('Video.js init failed', e); }

  playCurrentVideo();
  renderInfo();
  addToHistory();
});

function playCurrentVideo() {
  const v = curVid;
  const pc = document.getElementById('playerContainer');
  const rc = document.getElementById('radioContainer');
  const yc = document.getElementById('youtubeContainer');
  const yf = document.getElementById('youtubeFrame');
  const isRadio = v.ty === 'Radio';
  const isYTLive = v.isYouTube && v.isPinned && v.duration === 'LIVE';
  const isExternalIframe = v.isExternal || (v.u && (v.u.includes('koryo.tv') || v.u.includes('/channel/')));
  const isEmbedCode = v.isEmbed || (v.u && v.u.startsWith('<'));

  stopRadio();

  if (isEmbedCode) {
    // Raw HTML embed code (from admin panel)
    pc.style.display = 'none'; rc.style.display = 'none'; yc.style.display = 'block';
    // Write embed HTML to iframe using srcdoc
    const embedHtml = `<!DOCTYPE html>
<html>
<head>
<style>*{margin:0;padding:0;box-sizing:border-box;}html,body{width:100%;height:100%;background:#000;overflow:hidden;}</style>
</head>
<body>${v.u}</body>
</html>`;
    yf.srcdoc = embedHtml;
    const ytOv = document.getElementById('yt-live-overlay');
    if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
  } else if (isExternalIframe) {
    // External iframe source (like koryo.tv)
    pc.style.display = 'none'; rc.style.display = 'none'; yc.style.display = 'block';
    yf.src = v.u;
    const ytOv = document.getElementById('yt-live-overlay');
    if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
  } else if (isYTLive) {
    pc.style.display = 'block'; rc.style.display = 'none'; yc.style.display = 'none'; yf.src = '';
    const ytSrc = `https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1&controls=0`;
    let ytOv = document.getElementById('yt-live-overlay');
    if (!ytOv) {
      ytOv = document.createElement('div'); ytOv.id = 'yt-live-overlay';
      ytOv.style.cssText = 'position:absolute;inset:0;z-index:5;';
      bfPlayer.el().appendChild(ytOv);
    }
    ytOv.innerHTML = `<iframe src="${ytSrc}" style="width:100%;height:100%;border:none;" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
    ytOv.style.display = 'block';
    try { bfPlayer.pause(); bfPlayer.src(''); } catch(e) {}
  } else if (v.isYouTube) {
    pc.style.display = 'none'; rc.style.display = 'none'; yc.style.display = 'block';
    yf.src = `https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1`;
    const ytOv = document.getElementById('yt-live-overlay');
    if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
  } else if (isRadio) {
    pc.style.display = 'none'; rc.style.display = 'flex'; yc.style.display = 'none'; yf.src = '';
    document.getElementById('radioStationName').textContent = v.t;
    document.getElementById('radioDiscLetter').textContent = (v.tk || v.t).charAt(0).toUpperCase();
    startRadio(v.u);
  } else {
    pc.style.display = 'block'; rc.style.display = 'none'; yc.style.display = 'none'; yf.src = '';
    const ytOv = document.getElementById('yt-live-overlay');
    if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
    const isHLS = v.isM3U8 || (v.u && v.u.endsWith('.m3u8'));
    if (bfPlayer) {
      bfPlayer.src({ src: v.u, type: isHLS ? 'application/x-mpegURL' : 'video/mp4' });
      bfPlayer.play().catch(() => { bfPlayer.muted(true); bfPlayer.play().then(() => setTimeout(() => bfPlayer.muted(false), 800)); });
      bfPlayer.on('timeupdate', () => {
        if (bfPlayer.duration()) saveProgress(curIdx, (bfPlayer.currentTime() / bfPlayer.duration()) * 100);
      });
    }
  }
}

function renderInfo() {
  const v = curVid;
  if (!v) return;
  document.title = v.t + ' — BloxyFlix';
  document.getElementById('navTitle').textContent = v.t;
  document.getElementById('pTitle').textContent = v.t;
  document.getElementById('pKr').textContent = v.tk || '';
  document.getElementById('pViews').textContent = (v.views || 0) + ' views • ' + (v.y || '');
  document.getElementById('pDesc').textContent = v.d || '';
  document.getElementById('playerInfo').style.display = 'block';
  document.getElementById('dlBtn').style.display = (!v.isYouTube && !v.isM3U8) ? 'flex' : 'none';
  updateRatingStars(v.userRating || 0);
  
  // Only show up next and comments if we have sessionStorage data
  if (curIdx >= 0 && slimVids.length > 0) {
    renderUpNext();
    renderComments(curIdx);
  } else {
    document.getElementById('upNextList').innerHTML = '';
    document.getElementById('commentsList').innerHTML = '<div class="no-comments">Comments not available in embed mode</div>';
    document.getElementById('commentCount').textContent = '0';
  }
  
  const ua = document.getElementById('commentAvatar');
  const uname = localStorage.getItem('bloxyflix-username') || 'Guest';
  ua.textContent = uname.charAt(0).toUpperCase();
  if (curIdx >= 0 && isInWatchlist(curIdx)) document.getElementById('watchlistBtn').classList.add('active');
}

// ── Placeholder thumb ──
function getThumb(v) {
  if (v.thumb) return v.thumb;
  if (v.isYouTube && v.u && !v.u.startsWith('http')) return `https://img.youtube.com/vi/${v.u}/hqdefault.jpg`;
  return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'><rect width='320' height='180' fill='%2313141a'/><text x='160' y='95' font-family='Arial' font-size='12' fill='%236b6d7e' text-anchor='middle'>BloxyFlix</text></svg>`;
}

// ── Up Next ──
function renderUpNext() {
  const list = document.getElementById('upNextList');
  if (slimVids.length < 2) { list.innerHTML = ''; return; }
  const items = [];
  for (let i = 1; i <= 4; i++) {
    const idx = (curIdx + i) % slimVids.length;
    if (idx !== curIdx) items.push({ ...slimVids[idx], _idx: idx });
  }
  list.innerHTML = items.map(v => `
    <div class="up-next-item" onclick="loadVideo(${v._idx})">
      <div class="up-next-thumb">
        <img src="${getThumb(v)}" alt="${v.t || ''}" loading="lazy">
        <span class="up-next-dur">${v.duration || ''}</span>
      </div>
      <div class="up-next-info">
        <div class="up-next-vtitle">${v.t || ''}</div>
        <div class="up-next-meta">${v.ty || ''} · ${v.views || 0} views</div>
      </div>
    </div>`).join('');
}

function loadVideo(idx) {
  const v = slimVids[idx];
  if (!v) return;
  stopAll();
  curVid = v;
  curIdx = idx;
  sessionStorage.setItem('bf-player-vid', JSON.stringify(v));
  sessionStorage.setItem('bf-player-idx', idx);
  window.scrollTo(0, 0);
  playCurrentVideo();
  renderInfo();
  addToHistory();
}

function playNext() {
  const nextIdx = (curIdx + 1) % slimVids.length;
  loadVideo(nextIdx);
}

// ── Radio ──
function startRadio(url) {
  radioAudio = new Audio();
  radioAudio.crossOrigin = 'anonymous';
  radioAudio.src = url;
  radioAudio.volume = parseFloat(document.getElementById('radioVolume').value);
  radioAudio.play().then(() => {
    radioPlaying = true;
    document.querySelector('#radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    document.getElementById('radioDisc').classList.add('playing');
    initVisualizer();
  }).catch(() => { radioPlaying = false; });
}
function stopRadio() {
  if (radioAnimFrame) { cancelAnimationFrame(radioAnimFrame); radioAnimFrame = null; }
  if (radioAudio) { radioAudio.pause(); radioAudio.src = ''; radioAudio = null; }
  if (radioCtx) { radioCtx.close().catch(() => {}); radioCtx = null; }
  radioAnalyser = null; radioPlaying = false;
  const disc = document.getElementById('radioDisc');
  if (disc) disc.classList.remove('playing');
  const icon = document.querySelector('#radioPlayIcon');
  if (icon) icon.setAttribute('d','M8 5v14l11-7z');
}
function toggleRadio() {
  if (!radioAudio) return;
  if (radioPlaying) {
    radioAudio.pause(); radioPlaying = false;
    document.getElementById('radioDisc').classList.remove('playing');
    document.querySelector('#radioPlayIcon').setAttribute('d','M8 5v14l11-7z');
  } else {
    radioAudio.play(); radioPlaying = true;
    document.getElementById('radioDisc').classList.add('playing');
    document.querySelector('#radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    if (!radioAnalyser) initVisualizer();
  }
}
function setRadioVolume(v) { if (radioAudio) radioAudio.volume = parseFloat(v); }
function initVisualizer() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx || !radioAudio) return;
    radioCtx = new AudioCtx();
    radioAnalyser = radioCtx.createAnalyser();
    radioAnalyser.fftSize = 64;
    const src = radioCtx.createMediaElementSource(radioAudio);
    src.connect(radioAnalyser); radioAnalyser.connect(radioCtx.destination);
    const canvas = document.getElementById('radioVisualizer');
    const ctx = canvas.getContext('2d');
    const buf = new Uint8Array(radioAnalyser.frequencyBinCount);
    function draw() {
      radioAnimFrame = requestAnimationFrame(draw);
      radioAnalyser.getByteFrequencyData(buf);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const barW = canvas.width / buf.length;
      buf.forEach((v, i) => {
        const h = (v / 255) * canvas.height * .8;
        const g = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - h);
        g.addColorStop(0,'rgba(232,38,58,.8)'); g.addColorStop(1,'rgba(201,168,76,.4)');
        ctx.fillStyle = g;
        ctx.fillRect(i * barW, canvas.height - h, barW - 1, h);
      });
    }
    draw();
  } catch(e) {}
}

// ── Stop all ──
function stopAll() {
  stopRadio();
  const yf = document.getElementById('youtubeFrame');
  if (yf) yf.src = '';
  const ytOv = document.getElementById('yt-live-overlay');
  if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
  if (bfPlayer) { try { bfPlayer.pause(); bfPlayer.src(''); } catch(e) {} }
}

// ── Navigation ──
function goBack() {
  stopAll();
  if (isEmbedded) {
    // In embedded mode, just pause and show a message
    showToast('Player paused');
  } else {
    window.location.href = 'index.html';
  }
}

// ── Actions ──
function likeVideo() {
  document.getElementById('likeBtn').classList.toggle('active');
  showToast(document.getElementById('likeBtn').classList.contains('active') ? 'Liked!' : 'Like removed');
}
function toggleWatchlist() {
  const idx = curIdx;
  const key = 'bloxyflix-watchlist';
  let wl = JSON.parse(localStorage.getItem(key) || '[]');
  const i = wl.indexOf(idx);
  if (i === -1) { wl.unshift(idx); showToast('Added to watchlist'); }
  else { wl.splice(i, 1); showToast('Removed from watchlist'); }
  localStorage.setItem(key, JSON.stringify(wl));
  document.getElementById('watchlistBtn').classList.toggle('active', i === -1);
}
function isInWatchlist(idx) {
  return JSON.parse(localStorage.getItem('bloxyflix-watchlist') || '[]').includes(idx);
}
function shareVideo() {
  if (navigator.share) navigator.share({ title: curVid?.t || 'BloxyFlix', url: window.location.href });
  else { navigator.clipboard.writeText(window.location.href); showToast('Link copied!'); }
}
function getEmbedCode() {
  if (!curVid) return '';
  // Build embed URL with video data
  const baseUrl = window.location.origin + window.location.pathname;
  const params = new URLSearchParams();
  params.set('embed', '1');
  params.set('title', curVid.t || 'Video');
  params.set('type', curVid.ty || 'Video');
  
  // For embed code videos, use the embedcode param
  if (curVid.isEmbed || (curVid.u && curVid.u.startsWith('<'))) {
    params.set('embedcode', encodeURIComponent(curVid.u));
  } else {
    params.set('url', encodeURIComponent(curVid.u || ''));
  }
  
  if (curVid.isYouTube) params.set('youtube', '1');
  if (curVid.isM3U8) params.set('m3u8', '1');
  if (curVid.isExternal || curVid.u?.includes('koryo.tv')) params.set('external', '1');
  if (curVid.isPinned || curVid.duration === 'LIVE') params.set('live', '1');
  
  const playerUrl = baseUrl + '?' + params.toString();
  
  return `<iframe src="${playerUrl}" style="width:100%;height:100%;border:none;background:#000;" scrolling="no" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
}
function copyEmbedCode() {
  const code = getEmbedCode();
  navigator.clipboard.writeText(code).then(() => showToast('Embed code copied!'));
}
function triggerDownload() {
  if (!curVid?.u) return;
  const a = document.createElement('a');
  a.href = curVid.u;
  a.download = (curVid.t || 'video').replace(/[^a-z0-9\s-]/gi,'').trim().replace(/\s+/g,'-') + '.mp4';
  a.click();
}
function toggleSubscribe() {
  const btn = document.getElementById('subscribeBtn');
  btn.classList.toggle('subscribed');
  btn.textContent = btn.classList.contains('subscribed') ? 'Subscribed' : 'Subscribe';
  showToast(btn.classList.contains('subscribed') ? 'Subscribed!' : 'Unsubscribed');
}
function toggleDesc() {
  const d = document.getElementById('pDesc');
  const b = document.getElementById('showMoreBtn');
  d.classList.toggle('expanded');
  b.textContent = d.classList.contains('expanded') ? 'Show less' : 'Show more';
}
function toggleAutoplay() {
  autoplay = !autoplay;
  document.getElementById('autoplayToggle').classList.toggle('active', autoplay);
  try {
    const s = JSON.parse(localStorage.getItem('bloxyflix-settings') || '{}');
    s.autoplay = autoplay;
    localStorage.setItem('bloxyflix-settings', JSON.stringify(s));
  } catch(e) {}
}
function rateVideo(r) {
  if (curVid) curVid.userRating = r;
  updateRatingStars(r);
  showToast('Rated ' + r + ' stars!');
}
function updateRatingStars(r) {
  document.querySelectorAll('#ratingStars .star').forEach((s,i) => s.classList.toggle('active', i < r));
}
function saveProgress(idx, pct) {
  const p = JSON.parse(localStorage.getItem('bloxyflix-progress') || '{}');
  p[idx] = Math.round(pct);
  localStorage.setItem('bloxyflix-progress', JSON.stringify(p));
}
function addToHistory() {
  if (curIdx < 0) return; // Skip for embedded mode
  let h = JSON.parse(localStorage.getItem('bloxyflix-history') || '[]');
  h = h.filter(i => i !== curIdx);
  h.unshift(curIdx);
  if (h.length > 50) h = h.slice(0, 50);
  localStorage.setItem('bloxyflix-history', JSON.stringify(h));
}

// ── Comments ──
function getComments(id) { return JSON.parse(localStorage.getItem('bloxyflix-comments') || '{}')[id] || []; }
function saveComments(id, c) {
  const all = JSON.parse(localStorage.getItem('bloxyflix-comments') || '{}');
  all[id] = c; localStorage.setItem('bloxyflix-comments', JSON.stringify(all));
}
function postComment() {
  const inp = document.getElementById('commentInput');
  const txt = inp.value.trim();
  if (!txt) return;
  const cs = getComments(curIdx);
  cs.unshift({ id: Date.now(), name: localStorage.getItem('bloxyflix-username') || 'Guest', text: txt, time: Date.now(), likes: 0, liked: false });
  saveComments(curIdx, cs);
  inp.value = ''; renderComments(curIdx); showToast('Comment posted!');
}
function likeComment(id) {
  const cs = getComments(curIdx);
  const c = cs.find(x => x.id === id);
  if (c) { c.liked ? (c.likes--, c.liked = false) : (c.likes++, c.liked = true); saveComments(curIdx, cs); renderComments(curIdx); }
}
function deleteComment(id) {
  const uname = localStorage.getItem('bloxyflix-username') || 'Guest';
  let cs = getComments(curIdx);
  const c = cs.find(x => x.id === id);
  if (c && c.name === uname) { cs = cs.filter(x => x.id !== id); saveComments(curIdx, cs); renderComments(curIdx); showToast('Deleted'); }
}
function formatAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return 'just now';
  const m = Math.floor(s/60); if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}
function renderComments(id) {
  const list = document.getElementById('commentsList');
  const count = document.getElementById('commentCount');
  const uname = localStorage.getItem('bloxyflix-username') || 'Guest';
  const cs = getComments(id);
  count.textContent = cs.length;
  if (!cs.length) { list.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>'; return; }
  function sc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function col(s) { let h=0; for(let c of s) h=s.charCodeAt(0)+((h<<5)-h); return ['#e8263a','#9c27b0','#2196f3','#4caf50','#ff9800','#00bcd4'][Math.abs(h)%6]; }
  list.innerHTML = cs.map(c => `
    <div class="comment-item">
      <div class="comment-avatar" style="background:${col(c.name)};">${c.name.charAt(0).toUpperCase()}</div>
      <div class="comment-body">
        <span class="comment-author">${sc(c.name)}</span><span class="comment-time">${formatAgo(c.time)}</span>
        <div class="comment-txt">${sc(c.text)}</div>
        <div class="comment-acts">
          <span onclick="likeComment(${c.id})" style="${c.liked?'color:var(--red)':''}">♥ ${c.likes||'Like'}</span>
          <span onclick="document.getElementById('commentInput').value='@${sc(c.name)} ';document.getElementById('commentInput').focus()">Reply</span>
          ${c.name===uname?`<span onclick="deleteComment(${c.id})">Delete</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (document.activeElement.tagName === 'INPUT') return;
  if (e.key === ' ') { e.preventDefault(); if (radioPlaying || radioAudio) toggleRadio(); else if (bfPlayer) bfPlayer.paused() ? bfPlayer.play() : bfPlayer.pause(); }
  if (e.key === 'ArrowRight' && bfPlayer) bfPlayer.currentTime(bfPlayer.currentTime()+10);
  if (e.key === 'ArrowLeft' && bfPlayer) bfPlayer.currentTime(Math.max(0, bfPlayer.currentTime()-10));
  if (e.key.toLowerCase() === 'f' && bfPlayer) bfPlayer.isFullscreen() ? bfPlayer.exitFullscreen() : bfPlayer.requestFullscreen();
  if (e.key.toLowerCase() === 'm' && bfPlayer) bfPlayer.muted(!bfPlayer.muted());
});

// ── Cross-Origin Messaging for Embedded Player ──
window.addEventListener('message', (e) => {
  if (!isEmbedded) return;
  const { action, data } = e.data || {};
  switch (action) {
    case 'play':
      if (bfPlayer) bfPlayer.play();
      if (radioAudio && !radioPlaying) toggleRadio();
      break;
    case 'pause':
      if (bfPlayer) bfPlayer.pause();
      if (radioAudio && radioPlaying) toggleRadio();
      break;
    case 'seek':
      if (bfPlayer && data && typeof data.time === 'number') bfPlayer.currentTime(data.time);
      break;
    case 'volume':
      if (bfPlayer && data && typeof data.level === 'number') bfPlayer.volume(data.level);
      if (radioAudio && data && typeof data.level === 'number') radioAudio.volume = data.level;
      break;
    case 'mute':
      if (bfPlayer) bfPlayer.muted(true);
      break;
    case 'unmute':
      if (bfPlayer) bfPlayer.muted(false);
      break;
    case 'fullscreen':
      if (bfPlayer) bfPlayer.requestFullscreen();
      break;
    case 'getStatus':
      e.source.postMessage({
        type: 'playerStatus',
        data: {
          playing: bfPlayer ? !bfPlayer.paused() : radioPlaying,
          currentTime: bfPlayer ? bfPlayer.currentTime() : 0,
          duration: bfPlayer ? bfPlayer.duration() : 0,
          volume: bfPlayer ? bfPlayer.volume() : (radioAudio ? radioAudio.volume : 1),
          muted: bfPlayer ? bfPlayer.muted() : false,
          title: curVid?.t || '',
          videoId: curIdx
        }
      }, e.origin);
      break;
  }
});
</script>
