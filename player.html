<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<title>BloxyFlix Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#0a0a0b;
  --bg2:#111114;
  --bg3:#18181d;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.05);
  --text:#e4e5f0;
  --text2:#9396b0;
  --muted:#5c5f78;
  --dim:#232438;
  --red:#d42030;
  --red2:#f03040;
  --red-glow:rgba(212,32,48,.25);
  --red-soft:rgba(212,32,48,.08);
  --gold:#c8982a;
  --gold-soft:rgba(200,152,42,.08);
  --font:'Sora',system-ui,sans-serif;
  --serif:'Noto Serif KR',serif;
  --mono:'JetBrains Mono',monospace;
  --r4:4px;
  --r8:8px;
}

html,body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);min-height:100vh;
  overflow-x:hidden;font-size:15px;
}

/* ─── TOPBAR ─────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:200;
  height:50px;
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  background:rgba(10,10,11,.94);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.topbar-back{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;
  color:var(--text2);font-family:var(--font);font-size:.78rem;font-weight:500;
  cursor:pointer;padding:6px 10px 6px 6px;
  border-radius:var(--r8);transition:all .15s;flex-shrink:0;
}
.topbar-back:hover{background:rgba(255,255,255,.06);color:var(--text);}
.topbar-back svg{fill:currentColor;flex-shrink:0;}
.topbar-logo{
  font-family:var(--font);font-size:1.05rem;font-weight:700;
  letter-spacing:2px;color:#fff;flex-shrink:0;text-transform:uppercase;
}
.topbar-logo em{color:var(--red);font-style:normal;}
.topbar-divider{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.topbar-title{
  flex:1;font-size:.8rem;font-weight:400;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.topbar-live{
  display:none;align-items:center;gap:5px;
  background:var(--red);color:#fff;
  font-size:.6rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;flex-shrink:0;
  animation:livepulse 2s ease-in-out infinite;
}
.topbar-live.show{display:flex;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 var(--red-glow);}50%{box-shadow:0 0 0 8px rgba(212,32,48,0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ─── PAGE LAYOUT ────────────────────────── */
.page{
  max-width:1280px;margin:0 auto;
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
}
.main-col{grid-column:1;min-width:0;}
.side-col{
  grid-column:2;
  border-left:1px solid var(--border);
  height:calc(100vh - 50px);
  position:sticky;top:50px;
  overflow-y:auto;
  background:var(--bg);
}
@media(max-width:900px){
  .page{grid-template-columns:1fr;}
  .side-col{grid-column:1;border-left:none;border-top:1px solid var(--border);height:auto;position:static;overflow-y:visible;}
}

/* ─── VIDEO STAGE ────────────────────────── */
.video-stage{width:100%;background:#000;position:relative;overflow:hidden;}
.video-stage::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--red) 30%,var(--red2) 50%,var(--gold) 75%,transparent 100%);
  z-index:10;pointer-events:none;
}
#playerContainer{display:none;}
.video-js{width:100%!important;height:auto!important;aspect-ratio:16/9;}
.vjs-big-play-button{border:none!important;background:rgba(0,0,0,.52)!important;backdrop-filter:blur(8px)!important;border-radius:50%!important;width:60px!important;height:60px!important;top:50%!important;left:50%!important;transform:translate(-50%,-50%)!important;transition:all .18s!important;}
.vjs-big-play-button:hover{background:rgba(212,32,48,.8)!important;transform:translate(-50%,-50%) scale(1.1)!important;}
.vjs-big-play-button .vjs-icon-placeholder:before{color:#fff!important;font-size:1.7rem!important;}
.vjs-control-bar{background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 100%)!important;padding:0 8px 6px!important;}
.vjs-progress-control .vjs-play-progress{background:var(--red)!important;}
.vjs-progress-control .vjs-play-progress:before{color:var(--red)!important;}
.vjs-volume-level{background:var(--red)!important;}
.vjs-slider{background:rgba(255,255,255,.1)!important;}
#yt-live-overlay{position:absolute;inset:0;z-index:5;display:none;}
#yt-live-overlay iframe{width:100%;height:100%;border:none;}
#youtubeContainer{display:none;width:100%;aspect-ratio:16/9;background:#000;}
#youtubeContainer iframe{width:100%;height:100%;border:none;}
#plyrContainer{display:none;width:100%;background:#000;}
#plyrContainer video{width:100%;aspect-ratio:16/9;display:block;}
:root{--plyr-color-main:#d42030;}
.plyr--video .plyr__control--overlaid{background:rgba(212,32,48,.8)!important;border-radius:50%!important;width:60px!important;height:60px!important;}
.plyr--video .plyr__control--overlaid:hover{background:var(--red2)!important;transform:scale(1.1)!important;}

/* ─── RADIO ──────────────────────────────── */
#radioContainer{display:none;}
.radio-wrap{width:100%;aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.radio-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at center,rgba(212,32,48,.06) 0%,transparent 70%);}
.radio-card{position:relative;z-index:2;background:rgba(10,11,18,.92);border:1px solid var(--border);backdrop-filter:blur(24px);border-radius:16px;padding:2rem 1.75rem;max-width:290px;width:88%;text-align:center;}
.radio-vis-wrap{position:relative;width:108px;height:108px;margin:0 auto 1.2rem;}
.radio-vis{position:absolute;inset:0;width:100%;height:100%;opacity:.5;}
.radio-disc{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#121320,#1a1c2e,#0d0f22,#121320);border:1.5px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;animation:spin 9s linear infinite paused;}
.radio-disc.playing{animation-play-state:running;}
@keyframes spin{to{transform:rotate(360deg);}}
.radio-disc-core{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a000e);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--red-glow);}
.radio-disc-letter{color:#fff;font-family:var(--font);font-size:1rem;font-weight:700;}
.radio-name{font-size:.95rem;font-weight:700;letter-spacing:.5px;margin-bottom:.35rem;}
.radio-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red-soft);border:1px solid rgba(212,32,48,.18);color:var(--red2);font-size:.6rem;font-weight:600;padding:.16rem .55rem;border-radius:3px;margin-bottom:1.2rem;text-transform:uppercase;letter-spacing:1.5px;}
.radio-badge-dot{width:5px;height:5px;background:var(--red2);border-radius:50%;animation:blink 1.2s infinite;}
.radio-controls{display:flex;align-items:center;gap:10px;justify-content:center;}
.radio-btn{width:42px;height:42px;border-radius:50%;background:var(--red);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;box-shadow:0 4px 14px var(--red-glow);flex-shrink:0;}
.radio-btn:hover{transform:scale(1.1);background:var(--red2);}
.radio-btn svg{width:18px;height:18px;}
.radio-vol{flex:1;display:flex;align-items:center;gap:7px;color:var(--muted);}
.radio-vol input{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--dim);outline:none;cursor:pointer;}
.radio-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--red);cursor:pointer;}

/* ─── SPINNER ────────────────────────────── */
.spin-overlay{display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:16/9;background:#000;}
.spinner{width:34px;height:34px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}

/* ─── TITLE BLOCK ────────────────────────── */
.vtitle-block{padding:16px 18px 14px;border-bottom:1px solid var(--border2);}
.v-live-pill{display:none;align-items:center;gap:5px;background:var(--red);color:#fff;font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 7px;border-radius:3px;margin-bottom:8px;width:fit-content;animation:livepulse 2s ease-in-out infinite;}
.v-live-pill.show{display:inline-flex;}
.vtitle{font-size:1.1rem;font-weight:600;line-height:1.32;color:#fff;margin-bottom:5px;word-break:break-word;}
.vtitle-kr{font-family:var(--serif);font-size:.85rem;font-weight:400;color:var(--text2);line-height:1.5;}

/* ─── INFO ROW ───────────────────────────── */
.vinfo-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border2);gap:12px;flex-wrap:wrap;}
.vinfo-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vinfo-stat{font-size:.78rem;color:var(--text2);font-weight:400;}
.vinfo-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:.67rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);}
.vinfo-chip.cat{background:var(--red-soft);color:var(--red2);border:1px solid rgba(212,32,48,.15);}
.vinfo-chip.dur{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(200,152,42,.15);}
.vinfo-chip.yr{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border);}
.vactions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.vact{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:.75rem;font-weight:500;padding:7px 13px;border-radius:var(--r8);cursor:pointer;transition:all .15s;}
.vact:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.15);color:var(--text);transform:translateY(-1px);}
.vact.active{color:var(--red2);border-color:rgba(212,32,48,.3);background:var(--red-soft);}
.vact svg{width:15px;height:15px;fill:currentColor;flex-shrink:0;}
.vact.dl{background:var(--red);border-color:transparent;color:#fff;}
.vact.dl:hover{background:var(--red2);box-shadow:0 3px 12px var(--red-glow);}

/* ─── RATING ─────────────────────────────── */
.vrating-row{display:flex;align-items:center;gap:4px;padding:10px 18px;border-bottom:1px solid var(--border2);}
.vrating-label{font-size:.72rem;color:var(--muted);margin-right:4px;}
.star{font-size:1.1rem;color:var(--dim);cursor:pointer;transition:all .14s;line-height:1;}
.star.active{color:var(--gold);text-shadow:0 0 10px rgba(200,152,42,.5);}
.star:hover{transform:scale(1.28);}

/* ─── CHANNEL ────────────────────────────── */
.vchannel{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border2);}
.vch-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red) 0%,#7a000e 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.95rem;font-weight:700;flex-shrink:0;box-shadow:0 2px 10px var(--red-glow);}
.vch-info{flex:1;min-width:0;}
.vch-name{font-size:.88rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vch-sub{font-size:.7rem;color:var(--muted);margin-top:1px;}
.vch-btn{background:var(--text);border:none;color:var(--bg);font-family:var(--font);font-size:.73rem;font-weight:700;padding:7px 14px;border-radius:var(--r8);cursor:pointer;transition:all .15s;flex-shrink:0;}
.vch-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(255,255,255,.1);}
.vch-btn.subscribed{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border);}

/* ─── DESCRIPTION ────────────────────────── */
.vdesc{padding:14px 18px;border-bottom:1px solid var(--border2);}
.vdesc-text{font-size:.83rem;color:var(--text2);line-height:1.8;font-weight:300;white-space:pre-line;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.vdesc-text.open{display:block;}
.vdesc-toggle{display:inline-block;margin-top:7px;font-size:.72rem;font-weight:600;color:var(--red2);cursor:pointer;transition:color .14s;}
.vdesc-toggle:hover{color:#fff;}

/* ─── SIDEBAR ─────────────────────────────── */
.side-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;background:rgba(10,10,11,.96);backdrop-filter:blur(16px);}
.side-head-title{font-size:.78rem;font-weight:600;color:var(--text2);letter-spacing:.3px;}
.autoplay-wrap{display:flex;align-items:center;gap:7px;}
.autoplay-label{font-size:.7rem;color:var(--muted);}
.toggle{width:34px;height:19px;background:var(--dim);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--red);}
.toggle::after{content:'';position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.5);}
.toggle.on::after{transform:translateX(15px);}

/* ─── UP NEXT ITEMS ──────────────────────── */
.un-item{display:flex;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border2);position:relative;}
.un-item:hover{background:rgba(255,255,255,.03);}
.un-item.current{background:rgba(212,32,48,.05);}
.un-item.current::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);}
.un-thumb{width:116px;height:65px;border-radius:var(--r4);background:var(--dim);flex-shrink:0;position:relative;overflow:hidden;}
.un-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s;}
.un-item:hover .un-thumb img{transform:scale(1.05);}
.un-dur{position:absolute;bottom:3px;right:4px;background:rgba(0,0,0,.88);color:#fff;font-size:.56rem;padding:1px 5px;border-radius:2px;font-family:var(--mono);}
.un-badge{position:absolute;top:3px;left:3px;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:1px 5px;border-radius:2px;}
.un-badge.yt{background:#ff0000;color:#fff;}
.un-badge.live{background:var(--red);color:#fff;}
.un-info{flex:1;min-width:0;}
.un-title{font-size:.8rem;font-weight:500;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
.un-meta{font-size:.67rem;color:var(--muted);}

/* ─── TOAST ──────────────────────────────── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(14,14,18,.97);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);color:var(--text);padding:8px 18px;border-radius:20px;font-size:.79rem;font-weight:500;opacity:0;transition:all .24s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── STAGGER REVEAL ─────────────────────── */
.main-col>*{opacity:0;transform:translateY(8px);animation:fadeUp .35s ease forwards;}
.main-col>*:nth-child(1){animation-delay:.02s;}
.main-col>*:nth-child(2){animation-delay:.08s;}
.main-col>*:nth-child(3){animation-delay:.12s;}
.main-col>*:nth-child(4){animation-delay:.16s;}
.main-col>*:nth-child(5){animation-delay:.20s;}
.main-col>*:nth-child(6){animation-delay:.23s;}
.main-col>*:nth-child(7){animation-delay:.26s;}
.side-col{opacity:0;animation:fadeUp .38s ease .1s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
</style>
</head>
<body>

<nav class="topbar">
  <button class="topbar-back" onclick="goBack()">
    <svg width="16" height="16" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back
  </button>
  <div class="topbar-logo">Bloxy<em>Flix</em></div>
  <div class="topbar-divider"></div>
  <div class="topbar-title" id="navTitle"></div>
  <div class="topbar-live" id="navLive"><span class="live-dot"></span>Live</div>
</nav>

<div class="page">

  <div class="main-col">

    <!-- VIDEO -->
    <div class="video-stage" id="videoStage">
      <div class="spin-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
      <div id="playerContainer"><video id="bfplayer" class="video-js vjs-big-play-centered" playsinline></video></div>
      <div id="plyrContainer"><video id="plyrVideo" playsinline></video></div>
      <div id="yt-live-overlay"></div>
      <div id="youtubeContainer"><iframe id="youtubeFrame" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>
      <div id="radioContainer" class="radio-wrap">
        <div class="radio-bg"></div>
        <div class="radio-card">
          <div class="radio-vis-wrap">
            <canvas id="radioVis" class="radio-vis"></canvas>
            <div class="radio-disc" id="radioDisc">
              <div class="radio-disc-core"><span class="radio-disc-letter" id="radioLetter">R</span></div>
            </div>
          </div>
          <div class="radio-name" id="radioName">STATION</div>
          <div class="radio-badge"><span class="radio-badge-dot"></span>Live Broadcast</div>
          <div class="radio-controls">
            <button class="radio-btn" onclick="toggleRadio()">
              <svg viewBox="0 0 24 24" fill="currentColor"><path id="radioPlayIcon" d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="radio-vol">
              <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              <input type="range" id="radioVolume" min="0" max="1" step="0.02" value="1" oninput="setRadioVolume(this.value)">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TITLE -->
    <div class="vtitle-block" id="titleBlock" style="display:none;">
      <div class="v-live-pill" id="livePill"><span class="live-dot"></span>Live</div>
      <h1 class="vtitle" id="pTitle"></h1>
      <div class="vtitle-kr" id="pKr"></div>
    </div>

    <!-- VIEWS + ACTIONS -->
    <div class="vinfo-row" id="infoRow" style="display:none;">
      <div class="vinfo-left" id="metaLeft"></div>
      <div class="vactions">
        <button class="vact" id="likeBtn" onclick="likeVideo()">
          <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>Like
        </button>
        <button class="vact" id="wlBtn" onclick="toggleWatchlist()">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>Save
        </button>
        <button class="vact" onclick="shareVideo()">
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>Share
        </button>
        <button class="vact dl" id="dlBtn" onclick="triggerDownload()" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Download
        </button>
      </div>
    </div>

    <!-- RATING -->
    <div class="vrating-row" id="ratingRow" style="display:none;">
      <span class="vrating-label">Rate:</span>
      <span class="star" onclick="rateVideo(1)">★</span>
      <span class="star" onclick="rateVideo(2)">★</span>
      <span class="star" onclick="rateVideo(3)">★</span>
      <span class="star" onclick="rateVideo(4)">★</span>
      <span class="star" onclick="rateVideo(5)">★</span>
    </div>

    <!-- CHANNEL -->
    <div class="vchannel" id="channelRow" style="display:none;">
      <div class="vch-avatar" id="chAvatar">BF</div>
      <div class="vch-info">
        <div class="vch-name" id="chName">BloxyFlix Archive</div>
        <div class="vch-sub">North Korean Cinema Collection</div>
      </div>
      <button class="vch-btn" id="subBtn" onclick="toggleSubscribe()">Subscribe</button>
    </div>

    <!-- DESCRIPTION -->
    <div class="vdesc" id="descRow" style="display:none;">
      <div class="vdesc-text" id="pDesc"></div>
      <div class="vdesc-toggle" id="descToggle" onclick="toggleDesc()" style="display:none;">Show more ↓</div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="side-col" id="sideCol" style="display:none;">
    <div class="side-head">
      <span class="side-head-title">Up Next</span>
      <div class="autoplay-wrap">
        <span class="autoplay-label">Autoplay</span>
        <div class="toggle on" id="autoplayToggle" onclick="toggleAutoplay()"></div>
      </div>
    </div>
    <div id="upNextList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
<script>
let curVid=null,curIdx=-1,slimVids=[];
let bfPlayer=null,plyrPlayer=null;
let radioAudio=null,radioCtx=null,radioAnalyser=null,radioAnimFrame=null,radioPlaying=false;
let autoplay=true;

window.addEventListener('DOMContentLoaded',()=>{
  try{const s=JSON.parse(localStorage.getItem('bloxyflix-settings')||'{}');autoplay=s.autoplay!==false;if(!autoplay)document.getElementById('autoplayToggle').classList.remove('on');}catch(e){}
  try{
    const raw=sessionStorage.getItem('bf-player-vid');
    const rawSlim=sessionStorage.getItem('bf-player-slim');
    if(!raw){goBack();return;}
    curVid=JSON.parse(raw);
    curIdx=parseInt(sessionStorage.getItem('bf-player-idx')||'0',10);
    slimVids=rawSlim?JSON.parse(rawSlim):[];
  }catch(e){goBack();return;}
  try{
    bfPlayer=videojs('bfplayer',{controls:true,autoplay:false,preload:'auto',fluid:true,aspectRatio:'16:9',playbackRates:[0.5,0.75,1,1.25,1.5,2],html5:{vhs:{overrideNative:true},nativeVideoTracks:false,nativeAudioTracks:false}});
    bfPlayer.on('ended',()=>{if(autoplay)playNext();});
  }catch(e){}
  try{
    plyrPlayer=new Plyr('#plyrVideo',{controls:['play-large','play','progress','current-time','duration','mute','volume','settings','pip','airplay','fullscreen'],settings:['quality','speed'],speed:{selected:1,options:[0.5,0.75,1,1.25,1.5,2]}});
    plyrPlayer.on('ended',()=>{if(autoplay)playNext();});
  }catch(e){}
  playCurrentVideo();renderInfo();addToHistory();
});

function playCurrentVideo(){
  const v=curVid;if(!v)return;
  const pc=document.getElementById('playerContainer'),prc=document.getElementById('plyrContainer'),rc=document.getElementById('radioContainer'),yc=document.getElementById('youtubeContainer'),yf=document.getElementById('youtubeFrame'),sp=document.getElementById('spinnerOverlay'),lp=document.getElementById('livePill'),nl=document.getElementById('navLive');
  [pc,prc,rc,yc].forEach(el=>{if(el)el.style.display='none';});
  if(sp)sp.style.display='flex';lp.classList.remove('show');nl.classList.remove('show');
  stopRadio();
  const isRadio=v.ty==='Radio'||(v.c==='live'&&v.isM3U8&&/radio/i.test(v.t));
  const isM3U8=v.isM3U8||(v.u&&v.u.endsWith('.m3u8'));
  const isYTLive=v.isYouTube&&v.isPinned&&(v.duration==='LIVE'||v.badge==='live');
  const isYT=v.isYouTube&&!isYTLive;
  if(isYTLive){
    if(pc)pc.style.display='block';if(sp)sp.style.display='none';lp.classList.add('show');nl.classList.add('show');
    const ytOv=document.getElementById('yt-live-overlay');
    ytOv.style.cssText='position:absolute;inset:0;z-index:5;';
    ytOv.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1&controls=1" style="width:100%;height:100%;border:none;aspect-ratio:16/9;" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
    try{bfPlayer.pause();bfPlayer.src('');}catch(e){}
  }else if(isYT){
    if(yc)yc.style.display='block';if(sp)sp.style.display='none';
    yf.src=`https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1`;
    const ytOv=document.getElementById('yt-live-overlay');ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';
  }else if(isRadio){
    if(rc)rc.style.display='flex';if(sp)sp.style.display='none';lp.classList.add('show');nl.classList.add('show');
    document.getElementById('radioName').textContent=v.t.toUpperCase();
    document.getElementById('radioLetter').textContent=(v.tk||v.t).charAt(0).toUpperCase();
    startRadio(v.u);
  }else if(isM3U8){
    if(prc)prc.style.display='block';lp.classList.add('show');nl.classList.add('show');
    const ytOv=document.getElementById('yt-live-overlay');ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';
    const ve=document.getElementById('plyrVideo');
    if(ve._hls){ve._hls.destroy();ve._hls=null;}
    if(Hls.isSupported()){
      const hls=new Hls({lowLatencyMode:true,backBufferLength:30});ve._hls=hls;
      hls.loadSource(v.u);hls.attachMedia(ve);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>{if(sp)sp.style.display='none';ve.play().catch(()=>{ve.muted=true;ve.play();});});
      hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)showToast('Stream error — retrying…');});
    }else if(ve.canPlayType('application/vnd.apple.mpegurl')){ve.src=v.u;ve.addEventListener('loadedmetadata',()=>{if(sp)sp.style.display='none';ve.play().catch(()=>{});});}
  }else{
    if(pc)pc.style.display='block';
    const ytOv=document.getElementById('yt-live-overlay');ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';
    if(bfPlayer){
      bfPlayer.src({src:v.u,type:'video/mp4'});
      bfPlayer.one('canplay',()=>{if(sp)sp.style.display='none';});
      bfPlayer.play().catch(()=>{bfPlayer.muted(true);bfPlayer.play().then(()=>setTimeout(()=>bfPlayer.muted(false),800));});
      bfPlayer.on('timeupdate',()=>{if(bfPlayer.duration())saveProgress(curIdx,(bfPlayer.currentTime()/bfPlayer.duration())*100);});
    }
    setTimeout(()=>{if(sp)sp.style.display='none';},3500);
  }
}

function renderInfo(){
  const v=curVid;if(!v)return;
  document.title=(v.t||'Video')+' — BloxyFlix';
  document.getElementById('navTitle').textContent=v.t||'';
  document.getElementById('pTitle').textContent=v.t||'';
  const kr=document.getElementById('pKr');kr.textContent=v.tk||'';kr.style.display=v.tk?'block':'none';
  const ml=document.getElementById('metaLeft');
  const parts=[];
  if(v.views!=null)parts.push(`<span class="vinfo-stat">${v.views} views</span>`);
  if(v.y&&v.y!=='Live')parts.push(`<span class="vinfo-chip yr">${v.y}</span>`);
  if(v.ty||v.c)parts.push(`<span class="vinfo-chip cat">${(v.ty||v.c).toUpperCase()}</span>`);
  if(v.duration&&v.duration!=='LIVE')parts.push(`<span class="vinfo-chip dur">${v.duration}</span>`);
  ml.innerHTML=parts.join('');
  const creator=v.creator||'Bloxy Flix';
  document.getElementById('chName').textContent=creator;
  document.getElementById('chAvatar').textContent=creator.charAt(0).toUpperCase();
  const descEl=document.getElementById('pDesc'),tog=document.getElementById('descToggle');
  descEl.textContent=v.d||'';
  tog.style.display=(v.d&&v.d.length>150)?'inline-block':'none';
  ['titleBlock','infoRow','ratingRow','channelRow'].forEach(id=>document.getElementById(id).style.display='block');
  document.getElementById('descRow').style.display=v.d?'block':'none';
  document.getElementById('sideCol').style.display='block';
  document.getElementById('dlBtn').style.display=(!v.isYouTube&&!v.isM3U8)?'inline-flex':'none';
  updateRatingStars(v.userRating||0);
  renderUpNext();
  if(isInWatchlist(curIdx))document.getElementById('wlBtn').classList.add('active');
}

function getThumb(v){
  if(v.thumb)return v.thumb;
  if(v.isYouTube&&v.u&&!v.u.startsWith('http'))return`https://img.youtube.com/vi/${v.u}/hqdefault.jpg`;
  return`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'><rect width='320' height='180' fill='%230a0a0b'/><text x='160' y='95' font-size='9' fill='%23232438' text-anchor='middle' font-family='Arial'>BLOXYFLIX</text></svg>`;
}

function renderUpNext(){
  const list=document.getElementById('upNextList');
  if(slimVids.length<2){list.innerHTML='';return;}
  const items=[];
  for(let i=1;i<=15;i++){const idx=(curIdx+i)%slimVids.length;if(idx!==curIdx)items.push({...slimVids[idx],_idx:idx});if(items.length>=12)break;}
  list.innerHTML=items.map(v=>`
    <div class="un-item${v._idx===curIdx?' current':''}" onclick="loadVideo(${v._idx})">
      <div class="un-thumb">
        <img src="${getThumb(v)}" alt="" loading="lazy">
        <span class="un-dur">${v.duration||''}</span>
        ${v.isYouTube?'<span class="un-badge yt">YT</span>':v.isM3U8?'<span class="un-badge live">LIVE</span>':''}
      </div>
      <div class="un-info">
        <div class="un-title">${v.t||''}</div>
        <div class="un-meta">${[v.ty||v.c||'',v.views!=null?v.views+' views':'',v.y&&v.y!=='Live'?v.y:''].filter(Boolean).join(' · ')}</div>
      </div>
    </div>`).join('');
}

function loadVideo(idx){const v=slimVids[idx];if(!v)return;stopAll();curVid=v;curIdx=idx;sessionStorage.setItem('bf-player-vid',JSON.stringify(v));sessionStorage.setItem('bf-player-idx',idx);window.scrollTo({top:0,behavior:'smooth'});playCurrentVideo();renderInfo();addToHistory();}
function playNext(){loadVideo((curIdx+1)%slimVids.length);}
function startRadio(url){radioAudio=new Audio();radioAudio.crossOrigin='anonymous';radioAudio.src=url;radioAudio.volume=parseFloat(document.getElementById('radioVolume').value);radioAudio.play().then(()=>{radioPlaying=true;document.querySelector('#radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');document.getElementById('radioDisc').classList.add('playing');initVisualizer();}).catch(()=>{radioPlaying=false;});}
function stopRadio(){if(radioAnimFrame){cancelAnimationFrame(radioAnimFrame);radioAnimFrame=null;}if(radioAudio){radioAudio.pause();radioAudio.src='';radioAudio=null;}if(radioCtx){radioCtx.close().catch(()=>{});radioCtx=null;}radioAnalyser=null;radioPlaying=false;const disc=document.getElementById('radioDisc');if(disc)disc.classList.remove('playing');const icon=document.querySelector('#radioPlayIcon');if(icon)icon.setAttribute('d','M8 5v14l11-7z');}
function toggleRadio(){if(!radioAudio)return;if(radioPlaying){radioAudio.pause();radioPlaying=false;document.getElementById('radioDisc').classList.remove('playing');document.querySelector('#radioPlayIcon').setAttribute('d','M8 5v14l11-7z');}else{radioAudio.play();radioPlaying=true;document.getElementById('radioDisc').classList.add('playing');document.querySelector('#radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');if(!radioAnalyser)initVisualizer();}}
function setRadioVolume(v){if(radioAudio)radioAudio.volume=parseFloat(v);}
function initVisualizer(){try{const AudioCtx=window.AudioContext||window.webkitAudioContext;if(!AudioCtx||!radioAudio)return;radioCtx=new AudioCtx();radioAnalyser=radioCtx.createAnalyser();radioAnalyser.fftSize=64;const src=radioCtx.createMediaElementSource(radioAudio);src.connect(radioAnalyser);radioAnalyser.connect(radioCtx.destination);const canvas=document.getElementById('radioVis'),ctx=canvas.getContext('2d'),buf=new Uint8Array(radioAnalyser.frequencyBinCount);function draw(){radioAnimFrame=requestAnimationFrame(draw);radioAnalyser.getByteFrequencyData(buf);ctx.clearRect(0,0,canvas.width,canvas.height);const bw=canvas.width/buf.length;buf.forEach((v,i)=>{const h=(v/255)*canvas.height*.85;const g=ctx.createLinearGradient(0,canvas.height,0,canvas.height-h);g.addColorStop(0,'rgba(212,32,48,.9)');g.addColorStop(1,'rgba(200,152,42,.3)');ctx.fillStyle=g;ctx.fillRect(i*bw,canvas.height-h,bw-1,h);});}draw();}catch(e){}}
function stopAll(){stopRadio();const yf=document.getElementById('youtubeFrame');if(yf)yf.src='';const ytOv=document.getElementById('yt-live-overlay');if(ytOv){ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';}if(bfPlayer){try{bfPlayer.pause();bfPlayer.src('');}catch(e){}}const ve=document.getElementById('plyrVideo');if(ve){if(ve._hls){ve._hls.destroy();ve._hls=null;}try{ve.pause();ve.src='';}catch(e){}}}
function goBack(){stopAll();window.location.href='index.html';}
function likeVideo(){document.getElementById('likeBtn').classList.toggle('active');showToast(document.getElementById('likeBtn').classList.contains('active')?'❤ Liked!':'Like removed');}
function toggleWatchlist(){const key='bloxyflix-watchlist';let wl=JSON.parse(localStorage.getItem(key)||'[]');const i=wl.indexOf(curIdx);if(i===-1){wl.unshift(curIdx);showToast('Saved to watchlist');}else{wl.splice(i,1);showToast('Removed from watchlist');}localStorage.setItem(key,JSON.stringify(wl));document.getElementById('wlBtn').classList.toggle('active',i===-1);}
function isInWatchlist(idx){return JSON.parse(localStorage.getItem('bloxyflix-watchlist')||'[]').includes(idx);}
function shareVideo(){if(navigator.share)navigator.share({title:curVid?.t||'BloxyFlix',url:window.location.href});else{navigator.clipboard.writeText(window.location.href);showToast('Link copied!');}}
function triggerDownload(){if(!curVid?.u)return;const a=document.createElement('a');a.href=curVid.u;a.download=(curVid.t||'video').replace(/[^a-z0-9\s-]/gi,'').trim().replace(/\s+/g,'-')+'.mp4';a.click();}
function toggleSubscribe(){const btn=document.getElementById('subBtn');btn.classList.toggle('subscribed');btn.textContent=btn.classList.contains('subscribed')?'Subscribed':'Subscribe';showToast(btn.classList.contains('subscribed')?'Subscribed!':'Unsubscribed');}
function toggleDesc(){const d=document.getElementById('pDesc'),b=document.getElementById('descToggle');d.classList.toggle('open');b.textContent=d.classList.contains('open')?'Show less ↑':'Show more ↓';}
function toggleAutoplay(){autoplay=!autoplay;document.getElementById('autoplayToggle').classList.toggle('on',autoplay);try{const s=JSON.parse(localStorage.getItem('bloxyflix-settings')||'{}');s.autoplay=autoplay;localStorage.setItem('bloxyflix-settings',JSON.stringify(s));}catch(e){}showToast(autoplay?'Autoplay on':'Autoplay off');}
function rateVideo(r){if(curVid)curVid.userRating=r;updateRatingStars(r);showToast('Rated '+r+' ★');}
function updateRatingStars(r){document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<r));}
function saveProgress(idx,pct){const p=JSON.parse(localStorage.getItem('bloxyflix-progress')||'{}');p[idx]=Math.round(pct);localStorage.setItem('bloxyflix-progress',JSON.stringify(p));}
function addToHistory(){let h=JSON.parse(localStorage.getItem('bloxyflix-history')||'[]');h=h.filter(i=>i!==curIdx);h.unshift(curIdx);if(h.length>50)h=h.slice(0,50);localStorage.setItem('bloxyflix-history',JSON.stringify(h));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();if(radioPlaying||radioAudio)toggleRadio();else if(bfPlayer)bfPlayer.paused()?bfPlayer.play():bfPlayer.pause();}
  if(e.key==='ArrowRight'&&bfPlayer)bfPlayer.currentTime(bfPlayer.currentTime()+10);
  if(e.key==='ArrowLeft'&&bfPlayer)bfPlayer.currentTime(Math.max(0,bfPlayer.currentTime()-10));
  if(e.key.toLowerCase()==='f'&&bfPlayer)bfPlayer.isFullscreen()?bfPlayer.exitFullscreen():bfPlayer.requestFullscreen();
  if(e.key.toLowerCase()==='m'&&bfPlayer)bfPlayer.muted(!bfPlayer.muted());
});
</script>
</body>
</html>
