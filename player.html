<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080809">
<title>BloxyFlix Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080809;
  --surface:#0f1013;
  --card:rgba(16,17,22,.95);
  --glass:rgba(255,255,255,.04);
  --glass2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.07);
  --border-hover:rgba(255,255,255,.14);
  --text:#dde0ec;
  --text2:#a8abc2;
  --muted:#5a5d72;
  --dim:#1e2030;
  --red:#cc1f2e;
  --red2:#e82535;
  --red-glow:rgba(204,31,46,.3);
  --red-tint:rgba(204,31,46,.06);
  --gold:#c49a2e;
  --gold-tint:rgba(196,154,46,.08);
  --green:#23a85a;
  --font:'Barlow',system-ui,sans-serif;
  --display:'Barlow Condensed',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:6px;
}

html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 45% at 50% 0%,rgba(204,31,46,.07) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}

/* ── NAV ─────────────────────────────────── */
.pnav{
  position:sticky;top:0;z-index:300;
  display:flex;align-items:center;gap:.75rem;
  padding:0 1.5rem;height:52px;
  background:rgba(8,8,9,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(28px) saturate(150%);
}
.pnav-back{
  display:flex;align-items:center;gap:.35rem;
  background:none;border:1px solid var(--border);
  color:var(--muted);font-size:.72rem;font-family:var(--display);font-weight:600;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  padding:.3rem .65rem;border-radius:4px;transition:all .18s;flex-shrink:0;
}
.pnav-back:hover{color:var(--text);border-color:var(--border-hover);background:var(--glass);}
.pnav-back svg{fill:currentColor;flex-shrink:0;}
.pnav-logo{
  font-family:var(--display);font-size:1.25rem;font-weight:800;
  letter-spacing:3px;color:#fff;flex-shrink:0;line-height:1;
  text-transform:uppercase;
}
.pnav-logo span{color:var(--red);}
.pnav-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.pnav-title{font-size:.82rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400;}
.pnav-live{
  display:none;align-items:center;gap:.3rem;
  background:var(--red);color:#fff;
  font-family:var(--display);font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:.22rem .6rem;border-radius:3px;flex-shrink:0;
  animation:livepulse 2.2s ease-in-out infinite;
}
.pnav-live.show{display:flex;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 var(--red-glow);}50%{box-shadow:0 0 0 7px transparent;}}
.pnav-live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── LAYOUT ──────────────────────────────── */
.player-layout{
  display:grid;
  grid-template-columns:1fr 340px;
  max-width:1500px;margin:0 auto;
  position:relative;z-index:1;
  align-items:start;
}
.player-main{grid-column:1;min-width:0;}
.player-sidebar{
  grid-column:2;
  border-left:1px solid var(--border);
  overflow-y:auto;
  max-height:calc(100vh - 52px);
  position:sticky;top:52px;
  background:rgba(8,8,10,.75);
  backdrop-filter:blur(16px);
}
@media(max-width:960px){
  .player-layout{grid-template-columns:1fr;}
  .player-sidebar{grid-column:1;border-left:none;border-top:1px solid var(--border);max-height:none;position:static;}
}

/* ── VIDEO STAGE ─────────────────────────── */
.video-stage{width:100%;background:#000;position:relative;overflow:hidden;}
.video-stage::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),#ff4455,var(--gold),var(--red));
  background-size:250% 100%;animation:shimmer 4s linear infinite;z-index:10;pointer-events:none;
}
@keyframes shimmer{0%{background-position:0%;}100%{background-position:250%;}}

#playerContainer{display:none;}
.video-js{width:100%!important;height:auto!important;aspect-ratio:16/9;}
.vjs-big-play-button{
  border:none!important;background:rgba(0,0,0,.5)!important;
  backdrop-filter:blur(10px)!important;border-radius:50%!important;
  width:62px!important;height:62px!important;
  top:50%!important;left:50%!important;transform:translate(-50%,-50%)!important;transition:all .2s!important;
}
.vjs-big-play-button:hover{background:rgba(204,31,46,.8)!important;transform:translate(-50%,-50%) scale(1.08)!important;}
.vjs-big-play-button .vjs-icon-placeholder:before{color:#fff!important;font-size:1.8rem!important;}
.vjs-control-bar{background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 100%)!important;padding:0 .5rem .4rem!important;}
.vjs-progress-control .vjs-play-progress{background:var(--red)!important;}
.vjs-progress-control .vjs-play-progress:before{color:var(--red)!important;}
.vjs-volume-level{background:var(--red)!important;}
.vjs-slider{background:rgba(255,255,255,.1)!important;}

#yt-live-overlay{position:absolute;inset:0;z-index:5;display:none;}
#yt-live-overlay iframe{width:100%;height:100%;border:none;}
#youtubeContainer{display:none;width:100%;aspect-ratio:16/9;background:#000;}
#youtubeContainer iframe{width:100%;height:100%;border:none;}
#plyrContainer{display:none;width:100%;background:#000;}
#plyrContainer video{width:100%;aspect-ratio:16/9;}
:root{--plyr-color-main:#cc1f2e;}
.plyr--video .plyr__control--overlaid{background:rgba(204,31,46,.8)!important;border-radius:50%!important;width:62px!important;height:62px!important;}
.plyr--video .plyr__control--overlaid:hover{background:var(--red2)!important;transform:scale(1.08)!important;}

/* ── RADIO ───────────────────────────────── */
#radioContainer{display:none;}
.radio-wrap{
  width:100%;aspect-ratio:16/9;background:#000;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.radio-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 60% at center,rgba(204,31,46,.06) 0%,transparent 70%);
}
.radio-card{
  position:relative;z-index:2;
  background:rgba(10,11,16,.9);border:1px solid var(--border);
  backdrop-filter:blur(24px);border-radius:14px;
  padding:2rem 1.75rem;max-width:300px;width:88%;text-align:center;
}
.radio-visualizer-wrap{position:relative;width:110px;height:110px;margin:0 auto 1.25rem;}
.radio-visualizer{position:absolute;inset:0;width:100%;height:100%;opacity:.5;}
.radio-disc{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,#131420,#1c1e2e,#0e1024,#131420);
  border:2px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  animation:spin 9s linear infinite paused;
}
.radio-disc.playing{animation-play-state:running;}
@keyframes spin{to{transform:rotate(360deg);}}
.radio-disc-inner{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),#7a0010);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--red-glow);
}
.radio-disc-letter{color:#fff;font-family:var(--display);font-size:1.3rem;font-weight:700;}
.radio-station-name{font-family:var(--display);font-size:1.2rem;font-weight:700;letter-spacing:2.5px;margin-bottom:.4rem;text-transform:uppercase;}
.radio-live-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  background:rgba(204,31,46,.1);border:1px solid rgba(204,31,46,.2);
  color:var(--red2);font-size:.62rem;font-weight:700;
  padding:.16rem .55rem;border-radius:3px;margin-bottom:1.2rem;
  text-transform:uppercase;letter-spacing:1.5px;font-family:var(--display);
}
.radio-live-dot{width:5px;height:5px;background:var(--red2);border-radius:50%;animation:blink 1.2s infinite;}
.radio-btn-row{display:flex;align-items:center;gap:.7rem;justify-content:center;}
.radio-btn{
  width:44px;height:44px;border-radius:50%;background:var(--red);border:none;
  color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 16px var(--red-glow);
}
.radio-btn:hover{transform:scale(1.08);background:var(--red2);}
.radio-btn svg{width:18px;height:18px;}
.radio-volume-wrap{flex:1;display:flex;align-items:center;gap:.5rem;color:var(--muted);}
.radio-volume{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--dim);outline:none;cursor:pointer;}
.radio-volume::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--red);cursor:pointer;box-shadow:0 0 6px var(--red-glow);}

/* ── SPINNER ─────────────────────────────── */
.spin-overlay{display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:16/9;background:#000;}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--red);border-radius:50%;animation:spin .85s linear infinite;}

/* ── INFO PANEL ──────────────────────────── */
.info-panel{
  padding:1.5rem 1.75rem;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(204,31,46,.03) 0%,transparent 60%);
}
.info-panel-top{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1rem;}
.info-panel-titles{flex:1;min-width:0;}
.live-badge{
  display:none;align-items:center;gap:.28rem;
  background:var(--red);color:#fff;
  font-family:var(--display);font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:.18rem .5rem;border-radius:3px;margin-bottom:.5rem;width:fit-content;
  animation:livepulse 2.2s ease-in-out infinite;
}
.live-badge.show{display:inline-flex;}
.live-badge-dot{width:4px;height:4px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
.video-title{
  font-family:var(--display);font-weight:800;
  font-size:clamp(1.4rem,3.5vw,2.1rem);
  letter-spacing:.5px;line-height:1.08;color:#fff;
  margin-bottom:.25rem;
}
.video-kr{font-size:.82rem;color:var(--muted);letter-spacing:.4px;font-style:italic;font-weight:300;margin-bottom:.75rem;}

/* ── META CHIPS ──────────────────────────── */
.meta-row{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem;}
.chip{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.18rem .52rem;border-radius:3px;
  font-family:var(--display);font-size:.72rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  border:1px solid var(--border);background:var(--glass);color:var(--text2);
}
.chip.red{background:var(--red-tint);border-color:rgba(204,31,46,.2);color:var(--red2);}
.chip.gold{background:var(--gold-tint);border-color:rgba(196,154,46,.2);color:var(--gold);}

/* ── RATING ──────────────────────────────── */
.rating-row{display:flex;align-items:center;gap:.3rem;}
.star{font-size:1rem;color:var(--dim);cursor:pointer;transition:all .15s;line-height:1;}
.star.active{color:var(--gold);text-shadow:0 0 10px rgba(196,154,46,.5);}
.star:hover{transform:scale(1.25);}

/* ── ACTION BAR ──────────────────────────── */
.action-bar{
  display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;
  padding:.85rem 1.75rem;border-bottom:1px solid var(--border);
}
.act-btn{
  display:flex;align-items:center;gap:.35rem;
  padding:.42rem .85rem;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text2);
  font-family:var(--display);font-size:.78rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  cursor:pointer;transition:all .16s;
}
.act-btn:hover{background:var(--glass2);border-color:var(--border-hover);color:var(--text);transform:translateY(-1px);}
.act-btn.active{color:var(--red2);border-color:rgba(204,31,46,.28);background:var(--red-tint);}
.act-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
.act-btn.primary{background:linear-gradient(135deg,var(--red),#a01020);border-color:transparent;color:#fff;}
.act-btn.primary:hover{background:linear-gradient(135deg,var(--red2),#c01828);box-shadow:0 4px 16px var(--red-glow);}

/* ── CHANNEL ROW ─────────────────────────── */
.channel-row{
  display:flex;align-items:center;gap:.9rem;
  padding:1rem 1.75rem;border-bottom:1px solid var(--border);
}
.ch-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),#7a0010);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--display);font-size:1.1rem;font-weight:700;
  flex-shrink:0;box-shadow:0 2px 12px var(--red-glow);
}
.ch-info{flex:1;}
.ch-name{font-size:.88rem;font-weight:600;color:var(--text);}
.ch-sub{font-size:.72rem;color:var(--muted);margin-top:.06rem;letter-spacing:.3px;}
.sub-btn{
  padding:.36rem .9rem;background:var(--text);border:none;color:var(--bg);
  font-family:var(--display);font-weight:700;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;
  border-radius:var(--radius);cursor:pointer;transition:all .15s;flex-shrink:0;
}
.sub-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,255,255,.1);}
.sub-btn.subscribed{background:var(--glass);color:var(--text);border:1px solid var(--border);}

/* ── DESCRIPTION ─────────────────────────── */
.desc-section{
  padding:1.1rem 1.75rem;
  border-bottom:1px solid var(--border);
}
.desc-label{
  font-family:var(--display);font-size:.7rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;
}
.desc-text{
  font-size:.84rem;color:var(--text2);line-height:1.8;font-weight:300;
  white-space:pre-line;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.desc-text.expanded{display:block;}
.show-more{
  font-family:var(--display);font-size:.72rem;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--red2);cursor:pointer;margin-top:.5rem;
  display:inline-flex;align-items:center;gap:.3rem;transition:color .15s;
}
.show-more:hover{color:#fff;}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar-head{
  padding:.9rem 1.15rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);position:sticky;top:0;
  background:rgba(8,8,10,.96);backdrop-filter:blur(16px);z-index:5;
}
.sidebar-head-title{
  font-family:var(--display);font-size:.8rem;font-weight:700;
  letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;
}
.toggle-sw{width:34px;height:19px;background:var(--dim);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-sw.on{background:var(--red);}
.toggle-sw::after{content:'';position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.5);}
.toggle-sw.on::after{transform:translateX(15px);}

/* ── UP NEXT ITEMS ───────────────────────── */
.up-next-item{
  display:flex;gap:.7rem;padding:.75rem 1.1rem;
  cursor:pointer;transition:background .14s;
  border-bottom:1px solid var(--border);position:relative;
}
.up-next-item:hover{background:rgba(255,255,255,.03);}
.up-next-item.current{background:rgba(204,31,46,.04);}
.up-next-item.current::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);}
.un-thumb{width:112px;height:63px;border-radius:4px;background:var(--dim);flex-shrink:0;position:relative;overflow:hidden;}
.un-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .28s;}
.up-next-item:hover .un-thumb img{transform:scale(1.05);}
.un-dur{position:absolute;bottom:3px;right:4px;background:rgba(0,0,0,.88);color:#fff;font-size:.57rem;padding:.1rem .28rem;border-radius:2px;font-family:var(--mono);}
.un-badge{position:absolute;top:3px;left:3px;font-family:var(--display);font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:.06rem .28rem;border-radius:2px;}
.un-badge.yt{background:#ff0000;color:#fff;}
.un-badge.live{background:var(--red);color:#fff;}
.un-info{flex:1;min-width:0;}
.un-title{font-size:.8rem;font-weight:600;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.25rem;}
.un-meta{font-size:.68rem;color:var(--muted);letter-spacing:.2px;}

/* ── TOAST ───────────────────────────────── */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(18px);
  background:rgba(12,13,18,.97);border:1px solid var(--border-hover);backdrop-filter:blur(24px);
  color:var(--text);padding:.5rem 1.15rem;border-radius:20px;
  font-size:.8rem;font-weight:500;
  opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── ANIMATIONS ──────────────────────────── */
.player-main>*{opacity:0;transform:translateY(8px);animation:fadeUp .38s ease forwards;}
.player-main>*:nth-child(1){animation-delay:.03s;}
.player-main>*:nth-child(2){animation-delay:.09s;}
.player-main>*:nth-child(3){animation-delay:.14s;}
.player-main>*:nth-child(4){animation-delay:.18s;}
.player-main>*:nth-child(5){animation-delay:.22s;}
.player-main>*:nth-child(6){animation-delay:.25s;}
.player-sidebar{opacity:0;animation:fadeUp .4s ease .1s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
</style>
</head>
<body>

<!-- NAV -->
<nav class="pnav" id="mainNav">
  <button class="pnav-back" onclick="goBack()">
    <svg width="13" height="13" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back
  </button>
  <div class="pnav-logo">BLOXY<span>FLIX</span></div>
  <div class="pnav-sep"></div>
  <div class="pnav-title" id="navTitle"></div>
  <div class="pnav-live" id="navLive"><span class="pnav-live-dot"></span>LIVE</div>
</nav>

<div class="player-layout">
  <div class="player-main">

    <!-- VIDEO STAGE -->
    <div class="video-stage" id="videoStage">
      <div class="spin-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
      <div id="playerContainer"><video id="bfplayer" class="video-js vjs-big-play-centered" playsinline></video></div>
      <div id="plyrContainer"><video id="plyrVideo" playsinline></video></div>
      <div id="yt-live-overlay"></div>
      <div id="youtubeContainer"><iframe id="youtubeFrame" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>
      <div id="radioContainer" class="radio-wrap">
        <div class="radio-bg"></div>
        <div class="radio-card">
          <div class="radio-visualizer-wrap">
            <canvas id="radioVisualizer" class="radio-visualizer"></canvas>
            <div class="radio-disc" id="radioDisc">
              <div class="radio-disc-inner"><span class="radio-disc-letter" id="radioDiscLetter">R</span></div>
            </div>
          </div>
          <div class="radio-station-name" id="radioStationName">STATION</div>
          <div class="radio-live-badge"><span class="radio-live-dot"></span>LIVE BROADCAST</div>
          <div class="radio-btn-row">
            <button class="radio-btn" onclick="toggleRadio()">
              <svg viewBox="0 0 24 24" fill="currentColor"><path id="radioPlayIcon" d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="radio-volume-wrap">
              <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              <input type="range" class="radio-volume" id="radioVolume" min="0" max="1" step="0.02" value="1" oninput="setRadioVolume(this.value)">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- INFO PANEL -->
    <div class="info-panel" id="heroStrip" style="display:none;">
      <div class="live-badge" id="liveBadge"><span class="live-badge-dot"></span>Live</div>
      <h1 class="video-title" id="pTitle"></h1>
      <p class="video-kr" id="pKr"></p>
      <div class="meta-row" id="metaChips"></div>
      <div class="rating-row" id="ratingStars">
        <span class="star" onclick="rateVideo(1)">★</span>
        <span class="star" onclick="rateVideo(2)">★</span>
        <span class="star" onclick="rateVideo(3)">★</span>
        <span class="star" onclick="rateVideo(4)">★</span>
        <span class="star" onclick="rateVideo(5)">★</span>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-bar" id="actionBar" style="display:none;">
      <button class="act-btn" id="likeBtn" onclick="likeVideo()">
        <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>Like
      </button>
      <button class="act-btn" id="watchlistBtn" onclick="toggleWatchlist()">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>Watchlist
      </button>
      <button class="act-btn" onclick="shareVideo()">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>Share
      </button>
      <button class="act-btn primary" id="dlBtn" onclick="triggerDownload()" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Download
      </button>
    </div>

    <!-- CHANNEL -->
    <div class="channel-row" id="channelRow" style="display:none;">
      <div class="ch-avatar" id="chAvatar">BF</div>
      <div class="ch-info">
        <div class="ch-name" id="chName">BloxyFlix Archive</div>
        <div class="ch-sub">North Korean Cinema Collection</div>
      </div>
      <button class="sub-btn" id="subscribeBtn" onclick="toggleSubscribe()">Subscribe</button>
    </div>

    <!-- DESCRIPTION -->
    <div class="desc-section" id="descSection" style="display:none;">
      <div class="desc-label">About</div>
      <div id="pDesc" class="desc-text"></div>
      <div class="show-more" id="showMoreBtn" onclick="toggleDesc()" style="display:none;">Show more ↓</div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="player-sidebar" id="playerSidebar" style="display:none;">
    <div class="sidebar-head">
      <span class="sidebar-head-title">Up Next</span>
      <div class="toggle-sw on" id="autoplayToggle" onclick="toggleAutoplay()" title="Toggle autoplay"></div>
    </div>
    <div id="upNextList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
<script>
let curVid=null,curIdx=-1,slimVids=[];
let bfPlayer=null,plyrPlayer=null;
let radioAudio=null,radioCtx=null,radioAnalyser=null,radioAnimFrame=null,radioPlaying=false;
let autoplay=true;

window.addEventListener('DOMContentLoaded',()=>{
  try{
    const s=JSON.parse(localStorage.getItem('bloxyflix-settings')||'{}');
    autoplay=s.autoplay!==false;
    if(!autoplay)document.getElementById('autoplayToggle').classList.remove('on');
  }catch(e){}
  try{
    const raw=sessionStorage.getItem('bf-player-vid');
    const rawSlim=sessionStorage.getItem('bf-player-slim');
    if(!raw){goBack();return;}
    curVid=JSON.parse(raw);
    curIdx=parseInt(sessionStorage.getItem('bf-player-idx')||'0',10);
    slimVids=rawSlim?JSON.parse(rawSlim):[];
  }catch(e){goBack();return;}
  try{
    bfPlayer=videojs('bfplayer',{
      controls:true,autoplay:false,preload:'auto',fluid:true,aspectRatio:'16:9',
      playbackRates:[0.5,0.75,1,1.25,1.5,2],
      html5:{vhs:{overrideNative:true},nativeVideoTracks:false,nativeAudioTracks:false}
    });
    bfPlayer.on('ended',()=>{if(autoplay)playNext();});
  }catch(e){}
  try{
    plyrPlayer=new Plyr('#plyrVideo',{
      controls:['play-large','play','progress','current-time','duration','mute','volume','settings','pip','airplay','fullscreen'],
      settings:['quality','speed'],
      speed:{selected:1,options:[0.5,0.75,1,1.25,1.5,2]}
    });
    plyrPlayer.on('ended',()=>{if(autoplay)playNext();});
  }catch(e){}
  playCurrentVideo();renderInfo();addToHistory();
});

function playCurrentVideo(){
  const v=curVid;if(!v)return;
  const pc=document.getElementById('playerContainer');
  const prc=document.getElementById('plyrContainer');
  const rc=document.getElementById('radioContainer');
  const yc=document.getElementById('youtubeContainer');
  const yf=document.getElementById('youtubeFrame');
  const sp=document.getElementById('spinnerOverlay');
  const lb=document.getElementById('liveBadge');
  const nl=document.getElementById('navLive');
  [pc,prc,rc,yc].forEach(el=>{if(el)el.style.display='none';});
  if(sp)sp.style.display='flex';
  lb.classList.remove('show');nl.classList.remove('show');
  stopRadio();
  const isRadio=v.ty==='Radio'||(v.c==='live'&&v.isM3U8&&/radio/i.test(v.t));
  const isM3U8=v.isM3U8||(v.u&&v.u.endsWith('.m3u8'));
  const isYTLive=v.isYouTube&&v.isPinned&&(v.duration==='LIVE'||v.badge==='live');
  const isYT=v.isYouTube&&!isYTLive;
  if(isYTLive){
    if(pc)pc.style.display='block';if(sp)sp.style.display='none';
    lb.classList.add('show');nl.classList.add('show');
    const ytOv=document.getElementById('yt-live-overlay');
    ytOv.style.cssText='position:absolute;inset:0;z-index:5;';
    ytOv.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1&controls=1" style="width:100%;height:100%;border:none;aspect-ratio:16/9;" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
    try{bfPlayer.pause();bfPlayer.src('');}catch(e){}
  }else if(isYT){
    if(yc)yc.style.display='block';if(sp)sp.style.display='none';
    yf.src=`https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1`;
    const ytOv=document.getElementById('yt-live-overlay');
    ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';
  }else if(isRadio){
    if(rc)rc.style.display='flex';if(sp)sp.style.display='none';
    lb.classList.add('show');nl.classList.add('show');
    document.getElementById('radioStationName').textContent=v.t.toUpperCase();
    document.getElementById('radioDiscLetter').textContent=(v.tk||v.t).charAt(0).toUpperCase();
    startRadio(v.u);
  }else if(isM3U8){
    if(prc)prc.style.display='block';
    lb.classList.add('show');nl.classList.add('show');
    const ytOv=document.getElementById('yt-live-overlay');
    ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';
    const ve=document.getElementById('plyrVideo');
    if(ve._hls){ve._hls.destroy();ve._hls=null;}
    if(Hls.isSupported()){
      const hls=new Hls({lowLatencyMode:true,backBufferLength:30});
      ve._hls=hls;hls.loadSource(v.u);hls.attachMedia(ve);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>{if(sp)sp.style.display='none';ve.play().catch(()=>{ve.muted=true;ve.play();});});
      hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)showToast('Stream error — retrying…');});
    }else if(ve.canPlayType('application/vnd.apple.mpegurl')){
      ve.src=v.u;ve.addEventListener('loadedmetadata',()=>{if(sp)sp.style.display='none';ve.play().catch(()=>{});});
    }
  }else{
    if(pc)pc.style.display='block';
    const ytOv=document.getElementById('yt-live-overlay');
    ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';
    if(bfPlayer){
      bfPlayer.src({src:v.u,type:'video/mp4'});
      bfPlayer.one('canplay',()=>{if(sp)sp.style.display='none';});
      bfPlayer.play().catch(()=>{bfPlayer.muted(true);bfPlayer.play().then(()=>setTimeout(()=>bfPlayer.muted(false),800));});
      bfPlayer.on('timeupdate',()=>{if(bfPlayer.duration())saveProgress(curIdx,(bfPlayer.currentTime()/bfPlayer.duration())*100);});
    }
    setTimeout(()=>{if(sp)sp.style.display='none';},3500);
  }
}

function renderInfo(){
  const v=curVid;if(!v)return;
  document.title=v.t+' — BloxyFlix';
  document.getElementById('navTitle').textContent=v.t;
  document.getElementById('pTitle').textContent=v.t;
  document.getElementById('pKr').textContent=v.tk||'';
  const chips=document.getElementById('metaChips');
  const parts=[];
  if(v.views)parts.push({l:(v.views||'0')+' views',c:''});
  if(v.y&&v.y!=='Live')parts.push({l:v.y,c:''});
  if(v.ty||v.c)parts.push({l:(v.ty||v.c).toUpperCase(),c:'red'});
  if(v.duration&&v.duration!=='LIVE')parts.push({l:v.duration,c:'gold'});
  chips.innerHTML=parts.map(p=>`<span class="chip ${p.c}">${p.l}</span>`).join('');
  const creator=v.creator||'Bloxy Flix';
  document.getElementById('chName').textContent=creator;
  document.getElementById('chAvatar').textContent=creator.charAt(0).toUpperCase();
  const descEl=document.getElementById('pDesc');
  const smBtn=document.getElementById('showMoreBtn');
  descEl.textContent=v.d||'';
  smBtn.style.display=(v.d&&v.d.length>150)?'inline-flex':'none';
  ['heroStrip','actionBar','channelRow','descSection'].forEach(id=>{
    document.getElementById(id).style.display='block';
  });
  document.getElementById('playerSidebar').style.display='block';
  document.getElementById('dlBtn').style.display=(!v.isYouTube&&!v.isM3U8)?'flex':'none';
  updateRatingStars(v.userRating||0);
  renderUpNext();
  if(isInWatchlist(curIdx))document.getElementById('watchlistBtn').classList.add('active');
}

function getThumb(v){
  if(v.thumb)return v.thumb;
  if(v.isYouTube&&v.u&&!v.u.startsWith('http'))return`https://img.youtube.com/vi/${v.u}/hqdefault.jpg`;
  return`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'><rect width='320' height='180' fill='%230c0d12'/><text x='160' y='95' font-size='10' fill='%231e2030' text-anchor='middle' font-family='Arial'>BLOXYFLIX</text></svg>`;
}

function renderUpNext(){
  const list=document.getElementById('upNextList');
  if(slimVids.length<2){list.innerHTML='';return;}
  const items=[];
  for(let i=1;i<=12;i++){
    const idx=(curIdx+i)%slimVids.length;
    if(idx!==curIdx)items.push({...slimVids[idx],_idx:idx});
    if(items.length>=10)break;
  }
  list.innerHTML=items.map(v=>`
    <div class="up-next-item${v._idx===curIdx?' current':''}" onclick="loadVideo(${v._idx})">
      <div class="un-thumb">
        <img src="${getThumb(v)}" alt="" loading="lazy">
        <span class="un-dur">${v.duration||''}</span>
        ${v.isYouTube?'<span class="un-badge yt">YT</span>':v.isM3U8?'<span class="un-badge live">LIVE</span>':''}
      </div>
      <div class="un-info">
        <div class="un-title">${v.t||''}</div>
        <div class="un-meta">${v.ty||v.c||''} · ${v.views||0} views${v.y&&v.y!=='Live'?' · '+v.y:''}</div>
      </div>
    </div>`).join('');
}

function loadVideo(idx){
  const v=slimVids[idx];if(!v)return;
  stopAll();curVid=v;curIdx=idx;
  sessionStorage.setItem('bf-player-vid',JSON.stringify(v));
  sessionStorage.setItem('bf-player-idx',idx);
  window.scrollTo({top:0,behavior:'smooth'});
  playCurrentVideo();renderInfo();addToHistory();
}
function playNext(){loadVideo((curIdx+1)%slimVids.length);}

function startRadio(url){
  radioAudio=new Audio();radioAudio.crossOrigin='anonymous';radioAudio.src=url;
  radioAudio.volume=parseFloat(document.getElementById('radioVolume').value);
  radioAudio.play().then(()=>{
    radioPlaying=true;
    document.querySelector('#radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    document.getElementById('radioDisc').classList.add('playing');
    initVisualizer();
  }).catch(()=>{radioPlaying=false;});
}
function stopRadio(){
  if(radioAnimFrame){cancelAnimationFrame(radioAnimFrame);radioAnimFrame=null;}
  if(radioAudio){radioAudio.pause();radioAudio.src='';radioAudio=null;}
  if(radioCtx){radioCtx.close().catch(()=>{});radioCtx=null;}
  radioAnalyser=null;radioPlaying=false;
  const disc=document.getElementById('radioDisc');if(disc)disc.classList.remove('playing');
  const icon=document.querySelector('#radioPlayIcon');if(icon)icon.setAttribute('d','M8 5v14l11-7z');
}
function toggleRadio(){
  if(!radioAudio)return;
  if(radioPlaying){
    radioAudio.pause();radioPlaying=false;
    document.getElementById('radioDisc').classList.remove('playing');
    document.querySelector('#radioPlayIcon').setAttribute('d','M8 5v14l11-7z');
  }else{
    radioAudio.play();radioPlaying=true;
    document.getElementById('radioDisc').classList.add('playing');
    document.querySelector('#radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    if(!radioAnalyser)initVisualizer();
  }
}
function setRadioVolume(v){if(radioAudio)radioAudio.volume=parseFloat(v);}
function initVisualizer(){
  try{
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    if(!AudioCtx||!radioAudio)return;
    radioCtx=new AudioCtx();radioAnalyser=radioCtx.createAnalyser();radioAnalyser.fftSize=64;
    const src=radioCtx.createMediaElementSource(radioAudio);
    src.connect(radioAnalyser);radioAnalyser.connect(radioCtx.destination);
    const canvas=document.getElementById('radioVisualizer'),ctx=canvas.getContext('2d'),buf=new Uint8Array(radioAnalyser.frequencyBinCount);
    function draw(){
      radioAnimFrame=requestAnimationFrame(draw);radioAnalyser.getByteFrequencyData(buf);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const bw=canvas.width/buf.length;
      buf.forEach((v,i)=>{
        const h=(v/255)*canvas.height*.85;
        const g=ctx.createLinearGradient(0,canvas.height,0,canvas.height-h);
        g.addColorStop(0,'rgba(204,31,46,.9)');g.addColorStop(1,'rgba(196,154,46,.3)');
        ctx.fillStyle=g;ctx.fillRect(i*bw,canvas.height-h,bw-1,h);
      });
    }draw();
  }catch(e){}
}
function stopAll(){
  stopRadio();
  const yf=document.getElementById('youtubeFrame');if(yf)yf.src='';
  const ytOv=document.getElementById('yt-live-overlay');
  if(ytOv){ytOv.innerHTML='';ytOv.style.cssText='position:absolute;inset:0;z-index:5;display:none;';}
  if(bfPlayer){try{bfPlayer.pause();bfPlayer.src('');}catch(e){}}
  const ve=document.getElementById('plyrVideo');
  if(ve){if(ve._hls){ve._hls.destroy();ve._hls=null;}try{ve.pause();ve.src='';}catch(e){}}
}
function goBack(){stopAll();window.location.href='index.html';}
function likeVideo(){
  document.getElementById('likeBtn').classList.toggle('active');
  showToast(document.getElementById('likeBtn').classList.contains('active')?'❤ Liked!':'Like removed');
}
function toggleWatchlist(){
  const key='bloxyflix-watchlist';let wl=JSON.parse(localStorage.getItem(key)||'[]');
  const i=wl.indexOf(curIdx);
  if(i===-1){wl.unshift(curIdx);showToast('Added to watchlist');}
  else{wl.splice(i,1);showToast('Removed from watchlist');}
  localStorage.setItem(key,JSON.stringify(wl));
  document.getElementById('watchlistBtn').classList.toggle('active',i===-1);
}
function isInWatchlist(idx){return JSON.parse(localStorage.getItem('bloxyflix-watchlist')||'[]').includes(idx);}
function shareVideo(){
  if(navigator.share)navigator.share({title:curVid?.t||'BloxyFlix',url:window.location.href});
  else{navigator.clipboard.writeText(window.location.href);showToast('Link copied!');}
}
function triggerDownload(){
  if(!curVid?.u)return;
  const a=document.createElement('a');a.href=curVid.u;
  a.download=(curVid.t||'video').replace(/[^a-z0-9\s-]/gi,'').trim().replace(/\s+/g,'-')+'.mp4';
  a.click();
}
function toggleSubscribe(){
  const btn=document.getElementById('subscribeBtn');
  btn.classList.toggle('subscribed');
  btn.textContent=btn.classList.contains('subscribed')?'Subscribed':'Subscribe';
  showToast(btn.classList.contains('subscribed')?'Subscribed!':'Unsubscribed');
}
function toggleDesc(){
  const d=document.getElementById('pDesc');const b=document.getElementById('showMoreBtn');
  d.classList.toggle('expanded');
  b.textContent=d.classList.contains('expanded')?'Show less ↑':'Show more ↓';
}
function toggleAutoplay(){
  autoplay=!autoplay;
  document.getElementById('autoplayToggle').classList.toggle('on',autoplay);
  try{const s=JSON.parse(localStorage.getItem('bloxyflix-settings')||'{}');s.autoplay=autoplay;localStorage.setItem('bloxyflix-settings',JSON.stringify(s));}catch(e){}
  showToast(autoplay?'Autoplay on':'Autoplay off');
}
function rateVideo(r){if(curVid)curVid.userRating=r;updateRatingStars(r);showToast('Rated '+r+' ★');}
function updateRatingStars(r){document.querySelectorAll('#ratingStars .star').forEach((s,i)=>s.classList.toggle('active',i<r));}
function saveProgress(idx,pct){
  const p=JSON.parse(localStorage.getItem('bloxyflix-progress')||'{}');
  p[idx]=Math.round(pct);localStorage.setItem('bloxyflix-progress',JSON.stringify(p));
}
function addToHistory(){
  let h=JSON.parse(localStorage.getItem('bloxyflix-history')||'[]');
  h=h.filter(i=>i!==curIdx);h.unshift(curIdx);
  if(h.length>50)h=h.slice(0,50);
  localStorage.setItem('bloxyflix-history',JSON.stringify(h));
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);
}
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();if(radioPlaying||radioAudio)toggleRadio();else if(bfPlayer)bfPlayer.paused()?bfPlayer.play():bfPlayer.pause();}
  if(e.key==='ArrowRight'&&bfPlayer)bfPlayer.currentTime(bfPlayer.currentTime()+10);
  if(e.key==='ArrowLeft'&&bfPlayer)bfPlayer.currentTime(Math.max(0,bfPlayer.currentTime()-10));
  if(e.key.toLowerCase()==='f'&&bfPlayer)bfPlayer.isFullscreen()?bfPlayer.exitFullscreen():bfPlayer.requestFullscreen();
  if(e.key.toLowerCase()==='m'&&bfPlayer)bfPlayer.muted(!bfPlayer.muted());
});
</script>
</body>
</html>
