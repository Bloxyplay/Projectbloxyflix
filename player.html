<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080809">
<title>BloxyFlix Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#080809;
  --bg2:#0e0e10;
  --bg3:#141417;
  --surface:rgba(255,255,255,.04);
  --surface2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.04);
  --text:#ecedf5;
  --text2:#8b8da8;
  --muted:#4a4c62;
  --dim:#1e1f2a;
  --red:#e8263a;
  --red2:#ff3347;
  --red-glow:rgba(232,38,58,.22);
  --red-soft:rgba(232,38,58,.07);
  --gold:#c9922a;
  --gold-soft:rgba(201,146,42,.07);
  --green:#22c55e;
  --font:'DM Sans',system-ui,sans-serif;
  --display:'Bebas Neue',sans-serif;
  --serif:'Noto Serif KR',serif;
  --mono:'JetBrains Mono',monospace;
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  overflow-x:hidden;
  font-size:15px;
  line-height:1.5;
}

/* ════ TOPBAR ════════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:300;
  height:52px;
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  background:rgba(8,8,9,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px);
}
.tb-back{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;
  color:var(--text2);font-family:var(--font);font-size:.78rem;font-weight:500;
  cursor:pointer;padding:5px 9px 5px 5px;border-radius:7px;
  transition:all .14s;flex-shrink:0;
}
.tb-back:hover{background:var(--surface2);color:var(--text);}
.tb-back svg{fill:currentColor;flex-shrink:0;}
.tb-logo{
  font-family:var(--display);
  font-size:1.35rem;letter-spacing:3px;
  color:#fff;flex-shrink:0;
  text-transform:uppercase;line-height:1;
}
.tb-logo em{color:var(--red);font-style:normal;}
.tb-sep{width:1px;height:14px;background:var(--border);flex-shrink:0;}
.tb-title{
  flex:1;font-size:.78rem;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-weight:400;
}
.tb-live{
  display:none;align-items:center;gap:5px;
  background:var(--red);color:#fff;
  font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;flex-shrink:0;
  animation:livepulse 2s ease-in-out infinite;
}
.tb-live.show{display:flex;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 var(--red-glow);}50%{box-shadow:0 0 0 7px rgba(232,38,58,0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}

/* ════ LAYOUT ════════════════════════════════ */
.layout{
  max-width:1320px;margin:0 auto;
  display:grid;
  grid-template-columns:minmax(0,1fr) 348px;
  align-items:start;
}
.main-col{grid-column:1;min-width:0;}
.side-col{
  grid-column:2;
  border-left:1px solid var(--border);
  height:calc(100vh - 52px);
  position:sticky;top:52px;
  overflow-y:auto;
  background:var(--bg);
  opacity:0;animation:fadeUp .4s ease .1s forwards;
}
@media(max-width:920px){
  .layout{grid-template-columns:1fr;}
  .side-col{grid-column:1;border-left:none;border-top:1px solid var(--border);height:auto;position:static;overflow-y:visible;}
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* ════ VIDEO STAGE ═══════════════════════════ */
.video-stage{
  width:100%;background:#000;
  position:relative;overflow:hidden;
}
/* Red accent line below video */
.video-stage::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--red) 20%,var(--red2) 50%,var(--gold) 80%,transparent);
  z-index:20;pointer-events:none;
}

/* spinner */
.spin-wrap{
  position:relative;width:100%;aspect-ratio:16/9;
  background:#000;display:flex;align-items:center;justify-content:center;
}
.spinner{
  width:36px;height:36px;
  border:2px solid rgba(255,255,255,.05);
  border-top-color:var(--red);
  border-radius:50%;animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Video.js */
#playerContainer{display:none;}
.video-js{width:100%!important;height:auto!important;aspect-ratio:16/9;}
.vjs-big-play-button{
  border:none!important;
  background:rgba(0,0,0,.5)!important;
  backdrop-filter:blur(10px)!important;
  border-radius:50%!important;
  width:64px!important;height:64px!important;
  top:50%!important;left:50%!important;
  transform:translate(-50%,-50%)!important;
  transition:all .18s!important;
}
.vjs-big-play-button:hover{background:rgba(232,38,58,.75)!important;transform:translate(-50%,-50%) scale(1.08)!important;}
.vjs-big-play-button .vjs-icon-placeholder:before{font-size:1.8rem!important;color:#fff!important;}
.vjs-control-bar{background:linear-gradient(to top,rgba(0,0,0,.95) 0%,transparent 100%)!important;padding:0 10px 8px!important;}
.vjs-play-progress,.vjs-volume-level{background:var(--red)!important;}
.vjs-play-progress:before{color:var(--red)!important;}
.vjs-slider{background:rgba(255,255,255,.08)!important;}
#yt-live-overlay{position:absolute;inset:0;z-index:5;display:none;}
#yt-live-overlay iframe{width:100%;height:100%;border:none;}

/* YouTube / GDrive container */
#youtubeContainer{display:none;width:100%;aspect-ratio:16/9;background:#000;}
#youtubeContainer iframe{width:100%;height:100%;border:none;display:block;}

/* HLS / Plyr container */
#plyrContainer{display:none;width:100%;background:#000;}
#plyrContainer video{width:100%;aspect-ratio:16/9;display:block;}

/* Radio */
#radioContainer{display:none;}
.radio-stage{width:100%;aspect-ratio:16/9;background:radial-gradient(ellipse at 50% 60%,#0e0004,#080809);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.radio-stage::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 40% 40% at 50% 50%,rgba(232,38,58,.06) 0%,transparent 70%);
}
.radio-card{
  position:relative;z-index:2;
  background:rgba(8,8,9,.88);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(32px);
  border-radius:18px;
  padding:2rem 1.75rem;
  max-width:280px;width:88%;text-align:center;
}
.radio-disc-wrap{position:relative;width:100px;height:100px;margin:0 auto 1.25rem;}
.radio-vis{position:absolute;inset:0;width:100%;height:100%;opacity:.55;}
.radio-disc{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,#0f0f18,#181828,#0a0a15,#0f0f18);
  border:1.5px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  animation:spin 10s linear infinite paused;
}
.radio-disc.playing{animation-play-state:running;}
.radio-core{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--red),#6a000c);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--red-glow);}
.radio-letter{color:#fff;font-family:var(--display);font-size:1.1rem;}
.radio-name{font-size:.9rem;font-weight:600;letter-spacing:.5px;margin-bottom:.3rem;}
.radio-live-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red-soft);border:1px solid rgba(232,38,58,.2);color:var(--red2);font-size:.58rem;font-weight:700;padding:.16rem .55rem;border-radius:3px;margin-bottom:1.1rem;text-transform:uppercase;letter-spacing:1.5px;}
.r-dot{width:5px;height:5px;background:var(--red2);border-radius:50%;animation:blink 1.1s infinite;}
.radio-controls{display:flex;align-items:center;gap:10px;justify-content:center;}
.radio-btn{width:44px;height:44px;border-radius:50%;background:var(--red);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;box-shadow:0 4px 14px var(--red-glow);flex-shrink:0;}
.radio-btn:hover{transform:scale(1.1);background:var(--red2);}
.radio-btn svg{width:18px;height:18px;fill:currentColor;}
.radio-vol{flex:1;display:flex;align-items:center;gap:7px;color:var(--muted);}
.radio-vol svg{fill:currentColor;flex-shrink:0;}
.radio-vol input{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--dim);outline:none;cursor:pointer;}
.radio-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--red);}

/* ════ TITLE BLOCK ═══════════════════════════ */
.vtitle-block{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border2);
  opacity:0;animation:fadeUp .3s ease .05s forwards;
}
.live-pill{
  display:none;align-items:center;gap:5px;
  background:var(--red);color:#fff;
  font-size:.56rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;margin-bottom:9px;width:fit-content;
  animation:livepulse 2s ease-in-out infinite;
}
.live-pill.show{display:inline-flex;}
.vtitle{
  font-family:var(--display);
  font-size:1.7rem;line-height:1.15;
  color:#fff;margin-bottom:6px;
  letter-spacing:.5px;word-break:break-word;
}
.vtitle-kr{
  font-family:var(--serif);
  font-size:.83rem;color:var(--text2);line-height:1.6;font-weight:400;
}

/* ════ META ROW ══════════════════════════════ */
.vmeta-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;border-bottom:1px solid var(--border2);
  gap:12px;flex-wrap:wrap;
  opacity:0;animation:fadeUp .3s ease .1s forwards;
}
.vmeta-left{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.vstat{font-size:.77rem;color:var(--text2);}
.vchip{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:3px;
  font-size:.64rem;font-weight:600;letter-spacing:.6px;text-transform:uppercase;font-family:var(--mono);
}
.vchip.cat{background:var(--red-soft);color:var(--red2);border:1px solid rgba(232,38,58,.14);}
.vchip.dur{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,146,42,.14);}
.vchip.yr{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.vchip.gdrive{background:rgba(66,133,244,.08);color:#4285f4;border:1px solid rgba(66,133,244,.18);}

/* action buttons */
.vactions{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;}
.vbtn{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-family:var(--font);font-size:.73rem;font-weight:500;
  padding:6px 12px;border-radius:7px;cursor:pointer;transition:all .14s;
}
.vbtn:hover{background:var(--surface2);border-color:rgba(255,255,255,.12);color:var(--text);transform:translateY(-1px);}
.vbtn.active{color:var(--red2);border-color:rgba(232,38,58,.28);background:var(--red-soft);}
.vbtn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
.vbtn.dl{background:var(--red);border-color:transparent;color:#fff;}
.vbtn.dl:hover{background:var(--red2);box-shadow:0 2px 12px var(--red-glow);transform:translateY(-1px);}

/* ════ RATING ════════════════════════════════ */
.vrating-row{
  display:flex;align-items:center;gap:5px;
  padding:10px 20px;border-bottom:1px solid var(--border2);
  opacity:0;animation:fadeUp .3s ease .13s forwards;
}
.vrating-label{font-size:.7rem;color:var(--muted);margin-right:3px;}
.star{font-size:1.05rem;color:var(--dim);cursor:pointer;transition:all .12s;line-height:1;}
.star.active{color:var(--gold);text-shadow:0 0 8px rgba(201,146,42,.5);}
.star:hover{transform:scale(1.3);}

/* ════ CHANNEL ═══════════════════════════════ */
.vchannel{
  display:flex;align-items:center;gap:12px;
  padding:13px 20px;border-bottom:1px solid var(--border2);
  opacity:0;animation:fadeUp .3s ease .16s forwards;
}
.vch-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--red) 0%,#6a000c 100%);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--display);font-size:1.1rem;letter-spacing:0;
  flex-shrink:0;box-shadow:0 2px 10px var(--red-glow);
}
.vch-info{flex:1;min-width:0;}
.vch-name{font-size:.87rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vch-sub{font-size:.68rem;color:var(--muted);margin-top:1px;}
.vch-btn{
  background:var(--text);border:none;
  color:var(--bg);font-family:var(--font);font-size:.72rem;font-weight:700;
  padding:7px 14px;border-radius:7px;cursor:pointer;transition:all .14s;flex-shrink:0;
}
.vch-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(255,255,255,.1);}
.vch-btn.subscribed{background:var(--surface2);color:var(--text);border:1px solid var(--border);}

/* ════ DESCRIPTION ═══════════════════════════ */
.vdesc{
  padding:14px 20px;border-bottom:1px solid var(--border2);
  opacity:0;animation:fadeUp .3s ease .19s forwards;
}
.vdesc-text{
  font-size:.82rem;color:var(--text2);line-height:1.85;font-weight:300;
  white-space:pre-line;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.vdesc-text.open{display:block;}
.vdesc-toggle{
  display:inline-block;margin-top:6px;
  font-size:.7rem;font-weight:600;color:var(--red2);cursor:pointer;transition:color .12s;
}
.vdesc-toggle:hover{color:#fff;}

/* ════ SIDEBAR ═══════════════════════════════ */
.side-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:5;
  background:rgba(8,8,9,.97);backdrop-filter:blur(20px);
}
.side-head-title{font-size:.75rem;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;font-family:var(--display);font-size:.9rem;letter-spacing:1.5px;}
.autoplay-wrap{display:flex;align-items:center;gap:7px;}
.autoplay-label{font-size:.68rem;color:var(--muted);}
.toggle{width:34px;height:19px;background:var(--dim);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--red);}
.toggle::after{content:'';position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.5);}
.toggle.on::after{transform:translateX(15px);}

/* up next items */
.un-item{
  display:flex;gap:10px;padding:10px 14px;
  cursor:pointer;transition:background .12s;
  border-bottom:1px solid var(--border2);position:relative;
}
.un-item:hover{background:var(--surface);}
.un-item.current{background:rgba(232,38,58,.05);}
.un-item.current::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);}
.un-thumb{width:112px;height:63px;border-radius:5px;background:var(--dim);flex-shrink:0;position:relative;overflow:hidden;}
.un-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .24s;}
.un-item:hover .un-thumb img{transform:scale(1.06);}
.un-dur{position:absolute;bottom:3px;right:4px;background:rgba(0,0,0,.88);color:#fff;font-size:.54rem;padding:1px 5px;border-radius:2px;font-family:var(--mono);}
.un-badge{position:absolute;top:3px;left:3px;font-size:.53rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:1px 5px;border-radius:2px;}
.un-badge.yt{background:#ff0000;color:#fff;}
.un-badge.live{background:var(--red);color:#fff;animation:livepulse 2s ease-in-out infinite;}
.un-badge.gd{background:#4285f4;color:#fff;}
.un-info{flex:1;min-width:0;}
.un-title{font-size:.79rem;font-weight:500;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
.un-meta{font-size:.65rem;color:var(--muted);}

/* ════ TOAST ═════════════════════════════════ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(8,8,9,.97);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(24px);
  color:var(--text);padding:8px 18px;
  border-radius:20px;font-size:.78rem;font-weight:500;
  opacity:0;transition:all .22s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ════ SCROLLBAR ═════════════════════════════ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">
  <button class="tb-back" onclick="goBack()">
    <svg width="15" height="15" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back
  </button>
  <div class="tb-logo">Bloxy<em>Flix</em></div>
  <div class="tb-sep"></div>
  <div class="tb-title" id="navTitle"></div>
  <div class="tb-live" id="navLive"><span class="live-dot"></span>Live</div>
</nav>

<div class="layout">

  <!-- MAIN COLUMN -->
  <div class="main-col">

    <!-- VIDEO STAGE -->
    <div class="video-stage" id="videoStage">
      <!-- Spinner -->
      <div class="spin-wrap" id="spinnerOverlay"><div class="spinner"></div></div>

      <!-- Video.js (MP4) -->
      <div id="playerContainer">
        <video id="bfplayer" class="video-js vjs-big-play-centered" playsinline></video>
      </div>

      <!-- HLS native -->
      <div id="plyrContainer">
        <video id="plyrVideo" playsinline controls></video>
      </div>

      <!-- YouTube live overlay (inside video-stage) -->
      <div id="yt-live-overlay"></div>

      <!-- YouTube / Google Drive iframe -->
      <div id="youtubeContainer">
        <iframe id="youtubeFrame"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>
      </div>

      <!-- Radio -->
      <div id="radioContainer">
        <div class="radio-stage">
          <div class="radio-card">
            <div class="radio-disc-wrap">
              <canvas id="radioVis" class="radio-vis"></canvas>
              <div class="radio-disc" id="radioDisc">
                <div class="radio-core"><span class="radio-letter" id="radioLetter">R</span></div>
              </div>
            </div>
            <div class="radio-name" id="radioName">STATION</div>
            <div class="radio-live-badge"><span class="r-dot"></span>Live Broadcast</div>
            <div class="radio-controls">
              <button class="radio-btn" onclick="toggleRadio()">
                <svg viewBox="0 0 24 24"><path id="radioPlayIcon" d="M8 5v14l11-7z"/></svg>
              </button>
              <div class="radio-vol">
                <svg viewBox="0 0 24 24" width="13" height="13"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" id="radioVolume" min="0" max="1" step="0.02" value="1" oninput="setRadioVolume(this.value)">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TITLE -->
    <div class="vtitle-block" id="titleBlock" style="display:none;">
      <div class="live-pill" id="livePill"><span class="live-dot"></span>Live</div>
      <h1 class="vtitle" id="pTitle"></h1>
      <div class="vtitle-kr" id="pKr" style="display:none;"></div>
    </div>

    <!-- META + ACTIONS -->
    <div class="vmeta-row" id="infoRow" style="display:none;">
      <div class="vmeta-left" id="metaLeft"></div>
      <div class="vactions">
        <button class="vbtn" id="likeBtn" onclick="likeVideo()">
          <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
          Like
        </button>
        <button class="vbtn" id="wlBtn" onclick="toggleWatchlist()">
          <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
          Save
        </button>
        <button class="vbtn" onclick="shareVideo()">
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
          Share
        </button>
        <button class="vbtn dl" id="dlBtn" onclick="triggerDownload()" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download
        </button>
      </div>
    </div>

    <!-- RATING -->
    <div class="vrating-row" id="ratingRow" style="display:none;">
      <span class="vrating-label">Rate:</span>
      <span class="star" onclick="rateVideo(1)">★</span>
      <span class="star" onclick="rateVideo(2)">★</span>
      <span class="star" onclick="rateVideo(3)">★</span>
      <span class="star" onclick="rateVideo(4)">★</span>
      <span class="star" onclick="rateVideo(5)">★</span>
    </div>

    <!-- CHANNEL -->
    <div class="vchannel" id="channelRow" style="display:none;">
      <div class="vch-avatar" id="chAvatar">BF</div>
      <div class="vch-info">
        <div class="vch-name" id="chName">BloxyFlix Archive</div>
        <div class="vch-sub">North Korean Cinema Collection</div>
      </div>
      <button class="vch-btn" id="subBtn" onclick="toggleSubscribe()">Subscribe</button>
    </div>

    <!-- DESCRIPTION -->
    <div class="vdesc" id="descRow" style="display:none;">
      <div class="vdesc-text" id="pDesc"></div>
      <div class="vdesc-toggle" id="descToggle" onclick="toggleDesc()" style="display:none;">Show more ↓</div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="side-col" id="sideCol" style="display:none;">
    <div class="side-head">
      <span class="side-head-title">Up Next</span>
      <div class="autoplay-wrap">
        <span class="autoplay-label">Autoplay</span>
        <div class="toggle on" id="autoplayToggle" onclick="toggleAutoplay()"></div>
      </div>
    </div>
    <div id="upNextList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
<script>
'use strict';
let curVid=null, curIdx=-1, slimVids=[];
let bfPlayer=null;
let radioAudio=null, radioCtx=null, radioAnalyser=null, radioAnimFrame=null, radioPlaying=false;
let autoplay=true;

/* ── Boot ───────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  // Load settings
  try {
    const s = JSON.parse(localStorage.getItem('bloxyflix-settings') || '{}');
    autoplay = s.autoplay !== false;
    if (!autoplay) document.getElementById('autoplayToggle').classList.remove('on');
  } catch(e) {}

  // Load session data
  try {
    const raw = sessionStorage.getItem('bf-player-vid');
    if (!raw) { goBack(); return; }
    curVid  = JSON.parse(raw);
    curIdx  = parseInt(sessionStorage.getItem('bf-player-idx') || '0', 10);
    const rawSlim = sessionStorage.getItem('bf-player-slim');
    slimVids = rawSlim ? JSON.parse(rawSlim) : [];
  } catch(e) { goBack(); return; }

  // Init Video.js for MP4
  try {
    bfPlayer = videojs('bfplayer', {
      controls: true, autoplay: false, preload: 'auto',
      fluid: true, aspectRatio: '16:9',
      playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
      html5: { vhs: { overrideNative: true }, nativeVideoTracks: false, nativeAudioTracks: false }
    });
    bfPlayer.on('ended', () => { if (autoplay) playNext(); });
  } catch(e) { console.warn('videojs init failed', e); }

  playCurrentVideo();
  renderInfo();
  addToHistory();
});

/* ── Play dispatcher ────────────────────────── */
function playCurrentVideo() {
  const v = curVid;
  if (!v) return;

  const pc  = document.getElementById('playerContainer');
  const hc  = document.getElementById('plyrContainer');
  const rc  = document.getElementById('radioContainer');
  const yc  = document.getElementById('youtubeContainer');
  const yf  = document.getElementById('youtubeFrame');
  const sp  = document.getElementById('spinnerOverlay');
  const lp  = document.getElementById('livePill');
  const nl  = document.getElementById('navLive');
  const ytOv= document.getElementById('yt-live-overlay');

  // Hide everything first
  [pc, hc, rc, yc].forEach(el => { if (el) el.style.display = 'none'; });
  if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
  if (sp) sp.style.display = 'flex';
  lp.classList.remove('show');
  nl.classList.remove('show');
  stopRadio();

  const isRadio   = v.ty === 'Radio' || (v.c === 'live' && v.isM3U8 && /radio/i.test(v.t));
  const isM3U8    = !isRadio && (v.isM3U8 || (v.u && v.u.endsWith('.m3u8')));
  const isYTLive  = v.isYouTube && v.isPinned && (v.duration === 'LIVE' || v.badge === 'live');
  const isYT      = v.isYouTube && !isYTLive;
  const isGDrive  = v.isGoogleDrive;

  if (isYTLive) {
    // YouTube live → overlay iframe inside playerContainer
    if (pc) pc.style.display = 'block';
    if (sp) sp.style.display = 'none';
    lp.classList.add('show'); nl.classList.add('show');
    ytOv.style.cssText = 'position:absolute;inset:0;z-index:5;display:block;';
    ytOv.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1&controls=1"
      style="width:100%;height:100%;border:none;" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
    try { bfPlayer.pause(); bfPlayer.src(''); } catch(e) {}

  } else if (isYT) {
    // Regular YouTube → youtubeContainer iframe
    if (yc) yc.style.display = 'block';
    if (sp) sp.style.display = 'none';
    yf.src = `https://www.youtube.com/embed/${v.u}?autoplay=1&rel=0&modestbranding=1`;

  } else if (isGDrive) {
    // Google Drive → same youtubeContainer iframe, /preview embed
    if (yc) yc.style.display = 'block';
    if (sp) sp.style.display = 'none';
    // v.u can be a raw file ID or a full drive URL — extract the ID either way
    const gdMatch = (v.u || '').match(/\/d\/([A-Za-z0-9_-]{10,})/);
    const gdId = gdMatch ? gdMatch[1] : v.u;
    yf.src = `https://drive.google.com/file/d/${gdId}/preview`;

  } else if (isRadio) {
    // Radio card
    if (rc) rc.style.display = 'block';
    if (sp) sp.style.display = 'none';
    lp.classList.add('show'); nl.classList.add('show');
    document.getElementById('radioName').textContent = v.t.toUpperCase();
    document.getElementById('radioLetter').textContent = (v.tk || v.t).charAt(0).toUpperCase();
    startRadio(v.u);

  } else if (isM3U8) {
    // HLS stream → native <video> with hls.js
    if (hc) hc.style.display = 'block';
    lp.classList.add('show'); nl.classList.add('show');
    const ve = document.getElementById('plyrVideo');
    if (ve._hls) { ve._hls.destroy(); ve._hls = null; }
    if (Hls.isSupported()) {
      const hls = new Hls({ lowLatencyMode: true, backBufferLength: 30 });
      ve._hls = hls;
      hls.loadSource(v.u);
      hls.attachMedia(ve);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        if (sp) sp.style.display = 'none';
        ve.play().catch(() => { ve.muted = true; ve.play(); });
      });
      hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) showToast('Stream error — retrying…'); });
    } else if (ve.canPlayType('application/vnd.apple.mpegurl')) {
      ve.src = v.u;
      ve.addEventListener('loadedmetadata', () => { if (sp) sp.style.display = 'none'; ve.play().catch(() => {}); }, { once: true });
    }

  } else {
    // MP4 / direct → Video.js
    if (pc) pc.style.display = 'block';
    if (bfPlayer) {
      bfPlayer.src({ src: v.u, type: 'video/mp4' });
      bfPlayer.one('canplay', () => { if (sp) sp.style.display = 'none'; });
      bfPlayer.play().catch(() => { bfPlayer.muted(true); bfPlayer.play().then(() => setTimeout(() => bfPlayer.muted(false), 800)); });
      bfPlayer.on('timeupdate', () => {
        if (bfPlayer.duration()) saveProgress(curIdx, (bfPlayer.currentTime() / bfPlayer.duration()) * 100);
      });
    }
    setTimeout(() => { if (sp) sp.style.display = 'none'; }, 4000);
  }
}

/* ── Render info panel ──────────────────────── */
function renderInfo() {
  const v = curVid;
  if (!v) return;
  document.title = (v.t || 'Video') + ' — BloxyFlix';
  document.getElementById('navTitle').textContent  = v.t || '';
  document.getElementById('pTitle').textContent    = v.t || '';

  const kr = document.getElementById('pKr');
  kr.textContent = v.tk || '';
  kr.style.display = v.tk ? 'block' : 'none';

  // Meta chips
  const parts = [];
  if (v.views != null) parts.push(`<span class="vstat">${v.views} views</span>`);
  if (v.y && v.y !== 'Live') parts.push(`<span class="vchip yr">${v.y}</span>`);
  if (v.ty || v.c)  parts.push(`<span class="vchip cat">${(v.ty || v.c).toUpperCase()}</span>`);
  if (v.duration && v.duration !== 'LIVE') parts.push(`<span class="vchip dur">${v.duration}</span>`);
  if (v.isGoogleDrive) parts.push(`<span class="vchip gdrive">Google Drive</span>`);
  document.getElementById('metaLeft').innerHTML = parts.join('');

  // Creator
  const creator = v.creator || 'BloxyFlix';
  document.getElementById('chName').textContent   = creator;
  document.getElementById('chAvatar').textContent = creator.charAt(0).toUpperCase();

  // Description
  const descEl = document.getElementById('pDesc');
  const togEl  = document.getElementById('descToggle');
  descEl.textContent = v.d || '';
  togEl.style.display = (v.d && v.d.length > 160) ? 'inline-block' : 'none';

  // Show panels
  ['titleBlock','infoRow','ratingRow','channelRow'].forEach(id => document.getElementById(id).style.display = 'block');
  document.getElementById('descRow').style.display  = v.d ? 'block' : 'none';
  document.getElementById('sideCol').style.display  = 'block';

  // Download only for direct files (not YT, M3U8, GDrive)
  document.getElementById('dlBtn').style.display = (!v.isYouTube && !v.isM3U8 && !v.isGoogleDrive) ? 'inline-flex' : 'none';

  updateRatingStars(v.userRating || 0);
  if (isInWatchlist(curIdx)) document.getElementById('wlBtn').classList.add('active');
  renderUpNext();
}

/* ── Thumbnail helper ───────────────────────── */
function getThumb(v) {
  if (v.thumb) return v.thumb;
  if (v.isYouTube && v.u && !v.u.startsWith('http'))
    return `https://img.youtube.com/vi/${v.u}/mqdefault.jpg`;
  if (v.isGoogleDrive) {
    const m = (v.u || '').match(/\/d\/([A-Za-z0-9_-]{10,})/);
    const id = m ? m[1] : v.u;
    return `https://drive.google.com/thumbnail?id=${id}&sz=w320`;
  }
  return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'><rect width='320' height='180' fill='%23080809'/><text x='160' y='95' font-size='8' fill='%231e1f2a' text-anchor='middle' font-family='Arial'>BLOXYFLIX</text></svg>`;
}

/* ── Up Next ────────────────────────────────── */
function renderUpNext() {
  const list = document.getElementById('upNextList');
  if (slimVids.length < 2) { list.innerHTML = ''; return; }
  const items = [];
  for (let i = 1; i <= 20; i++) {
    const idx = (curIdx + i) % slimVids.length;
    if (idx !== curIdx) items.push({ ...slimVids[idx], _idx: idx });
    if (items.length >= 14) break;
  }
  list.innerHTML = items.map(v => {
    const badge = v.isYouTube ? '<span class="un-badge yt">YT</span>'
      : v.isM3U8   ? '<span class="un-badge live">LIVE</span>'
      : v.isGoogleDrive ? '<span class="un-badge gd">GD</span>'
      : '';
    return `
    <div class="un-item${v._idx === curIdx ? ' current' : ''}" onclick="loadVideo(${v._idx})">
      <div class="un-thumb">
        <img src="${getThumb(v)}" alt="" loading="lazy">
        <span class="un-dur">${v.duration || ''}</span>
        ${badge}
      </div>
      <div class="un-info">
        <div class="un-title">${v.t || ''}</div>
        <div class="un-meta">${[v.ty || v.c || '', v.views != null ? v.views + ' views' : '', v.y && v.y !== 'Live' ? v.y : ''].filter(Boolean).join(' · ')}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── Load another video ─────────────────────── */
function loadVideo(idx) {
  const v = slimVids[idx];
  if (!v) return;
  stopAll();
  curVid = v; curIdx = idx;
  sessionStorage.setItem('bf-player-vid', JSON.stringify(v));
  sessionStorage.setItem('bf-player-idx', idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  playCurrentVideo();
  renderInfo();
  addToHistory();
}
function playNext() { loadVideo((curIdx + 1) % slimVids.length); }

/* ── Radio ──────────────────────────────────── */
function startRadio(url) {
  radioAudio = new Audio();
  radioAudio.crossOrigin = 'anonymous';
  radioAudio.src = url;
  radioAudio.volume = parseFloat(document.getElementById('radioVolume').value);
  radioAudio.play().then(() => {
    radioPlaying = true;
    document.getElementById('radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    document.getElementById('radioDisc').classList.add('playing');
    initVisualizer();
  }).catch(() => { radioPlaying = false; });
}
function stopRadio() {
  if (radioAnimFrame) { cancelAnimationFrame(radioAnimFrame); radioAnimFrame = null; }
  if (radioAudio) { radioAudio.pause(); radioAudio.src = ''; radioAudio = null; }
  if (radioCtx) { radioCtx.close().catch(() => {}); radioCtx = null; }
  radioAnalyser = null; radioPlaying = false;
  const disc = document.getElementById('radioDisc');
  if (disc) disc.classList.remove('playing');
  const icon = document.getElementById('radioPlayIcon');
  if (icon) icon.setAttribute('d','M8 5v14l11-7z');
}
function toggleRadio() {
  if (!radioAudio) return;
  if (radioPlaying) {
    radioAudio.pause(); radioPlaying = false;
    document.getElementById('radioDisc').classList.remove('playing');
    document.getElementById('radioPlayIcon').setAttribute('d','M8 5v14l11-7z');
  } else {
    radioAudio.play(); radioPlaying = true;
    document.getElementById('radioDisc').classList.add('playing');
    document.getElementById('radioPlayIcon').setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    if (!radioAnalyser) initVisualizer();
  }
}
function setRadioVolume(v) { if (radioAudio) radioAudio.volume = parseFloat(v); }
function initVisualizer() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx || !radioAudio) return;
    radioCtx = new AudioCtx();
    radioAnalyser = radioCtx.createAnalyser();
    radioAnalyser.fftSize = 64;
    const src = radioCtx.createMediaElementSource(radioAudio);
    src.connect(radioAnalyser);
    radioAnalyser.connect(radioCtx.destination);
    const canvas = document.getElementById('radioVis');
    const ctx = canvas.getContext('2d');
    const buf = new Uint8Array(radioAnalyser.frequencyBinCount);
    (function draw() {
      radioAnimFrame = requestAnimationFrame(draw);
      radioAnalyser.getByteFrequencyData(buf);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const bw = canvas.width / buf.length;
      buf.forEach((v, i) => {
        const h = (v / 255) * canvas.height * .85;
        const g = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - h);
        g.addColorStop(0, 'rgba(232,38,58,.9)');
        g.addColorStop(1, 'rgba(201,146,42,.3)');
        ctx.fillStyle = g;
        ctx.fillRect(i * bw, canvas.height - h, bw - 1, h);
      });
    })();
  } catch(e) {}
}

/* ── Stop everything ────────────────────────── */
function stopAll() {
  stopRadio();
  const yf = document.getElementById('youtubeFrame');
  if (yf) yf.src = '';
  const ytOv = document.getElementById('yt-live-overlay');
  if (ytOv) { ytOv.innerHTML = ''; ytOv.style.display = 'none'; }
  if (bfPlayer) { try { bfPlayer.pause(); bfPlayer.src(''); } catch(e) {} }
  const ve = document.getElementById('plyrVideo');
  if (ve) {
    if (ve._hls) { ve._hls.destroy(); ve._hls = null; }
    try { ve.pause(); ve.src = ''; } catch(e) {}
  }
}

/* ── UI helpers ─────────────────────────────── */
function goBack()          { stopAll(); window.location.href = 'index.html'; }
function likeVideo()       { document.getElementById('likeBtn').classList.toggle('active'); showToast(document.getElementById('likeBtn').classList.contains('active') ? '❤ Liked!' : 'Like removed'); }
function toggleWatchlist() {
  const key = 'bloxyflix-watchlist';
  let wl = JSON.parse(localStorage.getItem(key) || '[]');
  const i = wl.indexOf(curIdx);
  if (i === -1) { wl.unshift(curIdx); showToast('Saved to watchlist'); }
  else { wl.splice(i, 1); showToast('Removed from watchlist'); }
  localStorage.setItem(key, JSON.stringify(wl));
  document.getElementById('wlBtn').classList.toggle('active', i === -1);
}
function isInWatchlist(idx) { return JSON.parse(localStorage.getItem('bloxyflix-watchlist') || '[]').includes(idx); }
function shareVideo()       { if (navigator.share) navigator.share({ title: curVid?.t || 'BloxyFlix', url: window.location.href }); else { navigator.clipboard.writeText(window.location.href).catch(() => {}); showToast('Link copied!'); } }
function triggerDownload()  { if (!curVid?.u) return; const a = document.createElement('a'); a.href = curVid.u; a.download = (curVid.t || 'video').replace(/[^a-z0-9\s-]/gi,'').trim().replace(/\s+/g,'-') + '.mp4'; a.click(); }
function toggleSubscribe()  { const b = document.getElementById('subBtn'); b.classList.toggle('subscribed'); b.textContent = b.classList.contains('subscribed') ? 'Subscribed' : 'Subscribe'; showToast(b.classList.contains('subscribed') ? 'Subscribed!' : 'Unsubscribed'); }
function toggleDesc()       { const d = document.getElementById('pDesc'), b = document.getElementById('descToggle'); d.classList.toggle('open'); b.textContent = d.classList.contains('open') ? 'Show less ↑' : 'Show more ↓'; }
function toggleAutoplay()   { autoplay = !autoplay; document.getElementById('autoplayToggle').classList.toggle('on', autoplay); try { const s = JSON.parse(localStorage.getItem('bloxyflix-settings') || '{}'); s.autoplay = autoplay; localStorage.setItem('bloxyflix-settings', JSON.stringify(s)); } catch(e) {} showToast(autoplay ? 'Autoplay on' : 'Autoplay off'); }
function rateVideo(r)       { if (curVid) curVid.userRating = r; updateRatingStars(r); showToast('Rated ' + r + ' ★'); }
function updateRatingStars(r){ document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < r)); }
function saveProgress(idx, pct) { const p = JSON.parse(localStorage.getItem('bloxyflix-progress') || '{}'); p[idx] = Math.round(pct); localStorage.setItem('bloxyflix-progress', JSON.stringify(p)); }
function addToHistory()     { let h = JSON.parse(localStorage.getItem('bloxyflix-history') || '[]'); h = h.filter(i => i !== curIdx); h.unshift(curIdx); if (h.length > 50) h = h.slice(0, 50); localStorage.setItem('bloxyflix-history', JSON.stringify(h)); }
function showToast(msg)     { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2400); }

/* ── Keyboard shortcuts ─────────────────────── */
document.addEventListener('keydown', e => {
  if (document.activeElement.tagName === 'INPUT') return;
  if (e.key === ' ') {
    e.preventDefault();
    if (radioPlaying || radioAudio) toggleRadio();
    else if (bfPlayer) bfPlayer.paused() ? bfPlayer.play() : bfPlayer.pause();
  }
  if (e.key === 'ArrowRight' && bfPlayer) bfPlayer.currentTime(bfPlayer.currentTime() + 10);
  if (e.key === 'ArrowLeft'  && bfPlayer) bfPlayer.currentTime(Math.max(0, bfPlayer.currentTime() - 10));
  if (e.key.toLowerCase() === 'f' && bfPlayer) bfPlayer.isFullscreen() ? bfPlayer.exitFullscreen() : bfPlayer.requestFullscreen();
  if (e.key.toLowerCase() === 'm' && bfPlayer) bfPlayer.muted(!bfPlayer.muted());
});
</script>
